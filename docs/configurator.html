<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>主题配置器 — RemotionMG</title>
<style>
  :root {
    --bg: #08090f;
    --bg2: #0d1020;
    --card: #111528;
    --border: #1e2748;
    --text: #e8ecf5;
    --text2: #c0c8dd;
    --dim: #6b7a9e;
    --acc: #38e0ff;
    --acc2: #7aa2ff;
    --glow: rgba(56,224,255,0.12);
    --red: #ff5d73;
    --ok: #4ad9a0;
    --warn: #f0c040;
    --r: 8px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);font-size:12px;line-height:1.5}

  /* === Shell === */
  .shell{display:flex;flex-direction:column;height:100vh}

  /* === Top bar === */
  .top{height:38px;min-height:38px;display:flex;align-items:center;gap:8px;padding:0 12px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
  .top-title{font-weight:700;font-size:13px;white-space:nowrap;margin-right:8px}
  .theme-pills{display:flex;gap:3px;flex:1;min-width:0;overflow-x:auto}
  .theme-pills::-webkit-scrollbar{display:none}
  .tp{padding:3px 10px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:all .12s;font-family:inherit}
  .tp:hover{border-color:var(--dim);color:var(--text2)}
  .tp.on{border-color:var(--acc);color:var(--acc);background:var(--glow)}
  .tp .dot{width:8px;height:8px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);flex-shrink:0}
  .top-acts{display:flex;gap:4px;flex-shrink:0}

  /* === Body === */
  .body{flex:1;display:flex;min-height:0}

  /* === Left panel === */
  .left{width:50%;min-width:380px;display:flex;flex-direction:column;border-right:1px solid var(--border);min-height:0}

  /* -- Scene tabs -- */
  .scene-tabs{display:flex;gap:2px;padding:6px 10px 0;background:var(--bg2);flex-shrink:0}
  .st{padding:4px 12px;border-radius:var(--r) var(--r) 0 0;border:1px solid var(--border);border-bottom:none;background:var(--bg);color:var(--dim);font-size:11px;font-weight:600;cursor:pointer;transition:all .1s;font-family:inherit;display:flex;align-items:center;gap:4px}
  .st:hover{color:var(--text2)}
  .st.on{background:var(--card);color:var(--acc);border-color:var(--acc)}
  .st .sd{width:6px;height:6px;border-radius:50%}
  .st .sd.has{background:var(--ok)}.st .sd.no{background:var(--border)}

  /* -- Editor area -- */
  .editor{flex:1;overflow-y:auto;padding:10px 12px;background:var(--card);min-height:0}
  .editor::-webkit-scrollbar{width:4px}
  .editor::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

  .ed-row{display:flex;gap:4px;margin-bottom:4px;align-items:center}
  .ed-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:4px 6px;font-size:11px;font-family:inherit;min-width:0}
  .ed-row input:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 2px var(--glow)}
  .ed-row input.narrow{max-width:100px}
  .ed-row input.em{border-color:var(--warn);font-weight:700}
  .x-btn{width:20px;height:20px;border-radius:4px;border:1px solid var(--border);background:var(--bg2);color:var(--dim);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .1s}
  .x-btn:hover{border-color:var(--red);color:var(--red);background:rgba(255,93,115,0.08)}
  .add-btn{padding:3px 10px;border-radius:4px;border:1px dashed var(--border);background:transparent;color:var(--dim);cursor:pointer;font-size:10px;font-family:inherit;transition:all .1s;margin-top:2px}
  .add-btn:hover{border-color:var(--acc);color:var(--acc);background:var(--glow)}
  .empty-msg{color:var(--dim);font-size:11px;text-align:center;padding:12px 0}

  /* -- Controls strip -- */
  .controls{flex-shrink:0;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--bg2)}
  .ctrl-section{margin-bottom:6px}
  .ctrl-label{font-size:9px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
  .sl-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
  .sl-row .sl-name{font-size:10px;color:var(--dim);min-width:24px;font-weight:600}
  .sl-row input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:3px;background:var(--border);border-radius:2px;outline:none;border:none;padding:0}
  .sl-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--acc);cursor:pointer;border:2px solid var(--bg)}
  .sl-row input[type=range]::-moz-range-thumb{width:10px;height:10px;border-radius:50%;background:var(--acc);cursor:pointer;border:2px solid var(--bg)}
  .sl-row .sl-v{font-size:10px;font-weight:700;color:var(--acc);min-width:24px;text-align:right;font-variant-numeric:tabular-nums}

  .clr-row{display:flex;gap:8px;align-items:center}
  .clr-item{display:flex;align-items:center;gap:3px}
  .clr-item label{font-size:9px;color:var(--dim);font-weight:600}
  .clr-item input[type=color]{width:18px;height:18px;padding:0;border:1px solid var(--border);border-radius:3px;cursor:pointer;background:var(--bg);flex-shrink:0}
  .clr-item input[type=text]{width:64px;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text);padding:2px 4px;font-size:10px;font-family:"Menlo","Consolas",monospace}
  .clr-item input[type=text]:focus{outline:none;border-color:var(--acc)}

  .eo-grid{display:grid;grid-template-columns:auto 1fr 1fr;gap:3px 6px;align-items:center;font-size:10px}
  .eo-lbl{color:var(--dim);font-weight:600;font-size:9px;text-align:right}
  .eo-sel{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text);padding:2px 3px;font-size:10px;font-family:inherit;cursor:pointer}
  .eo-sel:focus{outline:none;border-color:var(--acc)}
  .eo-sel option{background:var(--bg);color:var(--text)}
  .eo-hdr{font-size:8px;color:var(--dim);font-weight:600;text-align:center}
  .eo-def{display:flex;gap:6px;align-items:center;margin-bottom:6px;padding:4px 6px;background:rgba(255,255,255,0.03);border-radius:3px;border:1px solid var(--border)}
  .eo-def-lbl{font-size:9px;color:var(--dim);font-weight:600;white-space:nowrap}
  .eo-def-sel{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text);padding:2px 3px;font-size:10px;font-family:inherit;cursor:pointer}
  .eo-def-sel:focus{outline:none;border-color:var(--acc)}
  .eo-def-sel option{background:var(--bg);color:var(--text)}
  .eo-apply{padding:2px 8px;border-radius:3px;border:1px solid var(--acc);background:transparent;color:var(--acc);font-size:9px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .1s}
  .eo-apply:hover{background:var(--glow)}

  /* -- Layout controls -- */
  .lo-section{padding:6px 12px;border-bottom:1px solid var(--border);background:var(--bg2)}
  .lo-grid{display:grid;grid-template-columns:auto 1fr;gap:3px 8px;align-items:center;font-size:10px}
  .lo-lbl{color:var(--dim);font-weight:600;font-size:9px;text-align:right;white-space:nowrap}
  .lo-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text);padding:2px 4px;font-size:10px;font-family:"Menlo","Consolas",monospace;box-sizing:border-box}
  .lo-input:focus{outline:none;border-color:var(--acc)}
  .lo-sel{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text);padding:2px 3px;font-size:10px;font-family:inherit;cursor:pointer}
  .lo-sel:focus{outline:none;border-color:var(--acc)}
  .lo-sel option{background:var(--bg);color:var(--text)}
  .lo-pair{display:flex;gap:4px}
  .lo-pair .lo-sub{flex:1;display:flex;align-items:center;gap:3px}
  .lo-pair .lo-sub label{color:var(--dim);font-size:8px;font-weight:600}
  .lo-scene-lbl{font-size:9px;color:var(--acc);font-weight:700;margin-bottom:2px}
  .lo-reset{padding:1px 6px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:8px;cursor:pointer;font-family:inherit;transition:all .1s;white-space:nowrap}
  .lo-reset:hover{border-color:var(--acc);color:var(--acc)}

  /* -- Scene order -- */
  .ord-section{padding:6px 12px;border-bottom:1px solid var(--border);background:var(--bg2)}
  .ord-label{font-size:9px;color:var(--dim);font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
  .ord-list{display:flex;gap:3px;flex-wrap:wrap;align-items:center}
  .ord-item{display:flex;align-items:center;gap:2px;padding:2px 6px;border-radius:4px;border:1px solid var(--border);background:var(--bg);font-size:10px;color:var(--text2);cursor:default;transition:all .1s}
  .ord-item.active{border-color:var(--acc);color:var(--acc);background:var(--glow)}
  .ord-arrow{width:14px;height:14px;border:none;background:transparent;color:var(--dim);cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;border-radius:2px;padding:0;transition:all .1s}
  .ord-arrow:hover{color:var(--acc);background:rgba(56,224,255,0.08)}
  .ord-sep{color:var(--dim);font-size:9px;opacity:.5;user-select:none}

  /* === Right panel === */
  .right{flex:1;display:flex;flex-direction:column;min-width:300px;min-height:0}

  /* -- Preview -- */
  .pv-header{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
  .pv-label{font-size:10px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:1px}
  .pv-spacer{flex:1}
  .pv-btn{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:var(--bg);color:var(--acc);cursor:pointer;font-size:8px;display:flex;align-items:center;justify-content:center;transition:all .1s}
  .pv-btn:hover{border-color:var(--acc);background:var(--glow)}
  .sp-btn{padding:1px 6px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:9px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .1s}
  .sp-btn:hover{border-color:var(--acc);color:var(--acc)}

  .pv-stage{flex:1;position:relative;overflow:hidden;min-height:120px}
  .pv-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:16px;overflow:hidden}
  .pv-text{white-space:nowrap;will-change:transform,opacity,filter}
  .pv-sub{font-size:10px;margin-top:4px;letter-spacing:1.5px;opacity:0.5}
  .pv-tag{position:absolute;left:8px;top:6px;font-size:8px;letter-spacing:1.5px;opacity:0.25;text-transform:uppercase;font-weight:700}
  .pv-list{display:none;position:absolute;left:16px;top:28px;right:16px;flex-direction:column;gap:6px}
  .pv-list-title{font-size:10px;font-weight:800;letter-spacing:1.5px;color:#6fa0ff;margin-bottom:4px}
  .pv-list-item{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700}
  .pv-list-dot{width:5px;height:5px;border-radius:50%;background:#4aa3ff;flex:0 0 auto;box-shadow:0 0 6px rgba(74,163,255,0.7)}
  .pv-lt{display:none;position:absolute;left:16px;bottom:16px;align-items:stretch;gap:8px}
  .pv-lt-bar{width:3px;border-radius:2px;flex:0 0 auto}
  .pv-lt-name{font-weight:900;line-height:1.05}
  .pv-lt-role{font-size:9px;margin-top:3px;letter-spacing:1px}

  .pv-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0;flex-wrap:wrap}
  .chips{display:flex;gap:3px;flex-wrap:wrap;flex:1;min-width:0}
  .chip{padding:2px 7px;border-radius:8px;font-size:9px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--dim);transition:all .1s;font-family:inherit}
  .chip.on{border-color:var(--acc);color:var(--acc);background:var(--glow)}
  .chip:hover:not(.on){border-color:var(--dim)}
  .tl{flex:1;min-width:60px;height:3px;background:var(--border);border-radius:2px;position:relative;overflow:hidden}
  .tl-p{position:absolute;left:0;top:0;height:100%;background:var(--acc);border-radius:2px;transition:width .05s linear}
  .tl-i{font-size:9px;color:var(--dim);white-space:nowrap}

  /* -- Output -- */
  .out{flex-shrink:0;border-top:1px solid var(--border);display:flex;flex-direction:column;max-height:40%;min-height:0}
  .out-head{display:flex;align-items:center;gap:6px;padding:4px 10px;cursor:pointer;user-select:none;background:var(--bg2)}
  .out-head:hover{background:rgba(255,255,255,0.02)}
  .out-head .arr{font-size:8px;color:var(--dim);transition:transform .15s}
  .out.open .out-head .arr{transform:rotate(90deg);color:var(--acc)}
  .out-head .oh-l{font-size:10px;font-weight:600;flex:1}
  .out-body{display:none;overflow:hidden;flex:1;min-height:0}
  .out.open .out-body{display:flex;flex-direction:column}
  .out-tabs{display:flex;gap:2px;padding:4px 10px 0;flex-shrink:0}
  .ot{padding:2px 8px;border-radius:4px 4px 0 0;cursor:pointer;font-size:10px;font-weight:600;border:1px solid var(--border);border-bottom:none;background:var(--bg);color:var(--dim);font-family:inherit;transition:all .1s}
  .ot.on{background:var(--card);color:var(--acc);border-color:var(--acc)}
  .out-code{flex:1;overflow:auto;padding:6px 10px;font-family:"Menlo","Consolas",monospace;font-size:10px;white-space:pre-wrap;word-break:break-all;line-height:1.4;color:var(--text2);min-height:0;background:var(--bg)}
  .tc{display:none}.tc.on{display:block}

  /* === Bottom bar === */
  .bot{height:34px;min-height:34px;display:flex;align-items:center;gap:6px;padding:0 12px;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0}
  .bot-info{font-size:10px;color:var(--dim);flex:1}
  .btn{padding:5px 14px;border-radius:var(--r);border:none;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;transition:all .12s;white-space:nowrap}
  .btn:hover{filter:brightness(1.1);transform:translateY(-1px)}.btn:active{transform:translateY(0)}
  .btn-p{background:linear-gradient(135deg,#38e0ff,#2a9fd6);color:#000}
  .btn-s{background:var(--card);border:1px solid var(--border);color:var(--text)}
  .btn-s:hover{border-color:var(--acc);color:var(--acc)}
  .btn-g{background:transparent;border:1px solid var(--border);color:var(--dim);font-size:10px;padding:4px 10px}
  .btn-g:hover{border-color:var(--acc);color:var(--acc)}

  /* === Toast === */
  .toast{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);background:var(--ok);color:#000;padding:6px 20px;border-radius:var(--r);font-weight:600;font-size:11px;z-index:999;animation:su .25s,fo 1.8s .4s forwards;box-shadow:0 3px 12px rgba(74,217,160,0.2)}
  @keyframes su{from{transform:translateX(-50%) translateY(12px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
  @keyframes fo{0%,50%{opacity:1}100%{opacity:0}}

  @media(max-width:760px){
    .body{flex-direction:column}
    .left{width:100%;min-width:0;max-height:55%}
    .right{min-width:0}
  }
</style>
</head>
<body>
<div class="shell">

<!-- === Top bar === -->
<div class="top">
  <span class="top-title">主题配置器</span>
  <div class="theme-pills" id="themePills"></div>
  <div class="top-acts">
    <button class="btn-g" onclick="resetConfig()">重置</button>
  </div>
</div>

<!-- === Body === -->
<div class="body">

  <!-- Left: Controls -->
  <div class="left">
    <!-- Controls strip -->
    <div class="controls">
      <div class="ctrl-section">
        <div class="ctrl-label">时序 Timing</div>
        <div class="sl-row"><span class="sl-name">入</span><input type="range" id="inF" min="4" max="60" value="20" oninput="sSync(this,'iv');uc()"><span class="sl-v" id="iv">20f</span></div>
        <div class="sl-row"><span class="sl-name">停</span><input type="range" id="holdF" min="0" max="90" value="40" oninput="sSync(this,'hv');uc()"><span class="sl-v" id="hv">40f</span></div>
        <div class="sl-row"><span class="sl-name">出</span><input type="range" id="outF" min="4" max="60" value="16" oninput="sSync(this,'ov');uc()"><span class="sl-v" id="ov">16f</span></div>
      </div>
      <div class="ctrl-section">
        <div class="ctrl-label">配色</div>
        <div class="clr-row">
          <div class="clr-item"><label>背景</label><input type="color" id="bgC" value="#0a1320" oninput="cSync('bgC','bgT');uc()"><input type="text" id="bgT" placeholder="#hex" oninput="uc()"></div>
          <div class="clr-item"><label>文字</label><input type="color" id="fgC" value="#eafcff" oninput="cSync('fgC','fgT');uc()"><input type="text" id="fgT" placeholder="#hex" oninput="uc()"></div>
          <div class="clr-item"><label>强调</label><input type="color" id="acC" value="#38e0ff" oninput="cSync('acC','acT');uc()"><input type="text" id="acT" placeholder="#hex" oninput="uc()"></div>
        </div>
      </div>
      <div class="ctrl-section" style="margin-bottom:0">
        <div class="ctrl-label">动效</div>
        <div class="eo-def" id="eoDefRow">
          <span class="eo-def-lbl">默认</span>
          <select class="eo-def-sel" id="eoDefIn" onchange="uc()"></select>
          <select class="eo-def-sel" id="eoDefOut" onchange="uc()"></select>
          <button class="eo-apply" onclick="applyDefToAll()">应用全部</button>
        </div>
        <div class="eo-grid" id="eoGrid">
          <div></div><div class="eo-hdr">入场</div><div class="eo-hdr">出场</div>
        </div>
      </div>
    </div>

    <!-- Layout controls -->
    <div class="lo-section">
      <div class="ctrl-label">布局 Layout <span style="font-weight:400;font-size:8px;color:var(--dim)">(当前场景)</span></div>
      <div id="loControls"></div>
    </div>

    <!-- Scene order -->
    <div class="ord-section">
      <div class="ord-label">队列 Order</div>
      <div class="ord-list" id="ordList"></div>
    </div>

    <!-- Scene tabs -->
    <div class="scene-tabs" id="sceneTabs"></div>

    <!-- Editor -->
    <div class="editor" id="editorArea"></div>
  </div>

  <!-- Right: Preview + Output -->
  <div class="right">
    <div class="pv-header">
      <span class="pv-label">预览</span>
      <div class="pv-spacer"></div>
      <button class="sp-btn" id="spBtn" onclick="cycleSpeed()">1x</button>
      <button class="pv-btn" id="playBtn" onclick="togglePlay()">&#9654;</button>
    </div>
    <div class="pv-stage" id="pvStage">
      <div class="pv-inner" id="pvInner">
        <div class="pv-tag" id="pvTag">HERO</div>
        <div class="pv-text" id="pvText" style="font-size:24px;font-weight:800">预览</div>
        <div class="pv-sub" id="pvSub"></div>
        <div class="pv-list" id="pvList"></div>
        <div class="pv-lt" id="pvLt">
          <div class="pv-lt-bar" id="pvLtBar"></div>
          <div><div class="pv-lt-name" id="pvLtName"></div><div class="pv-lt-role" id="pvLtRole"></div></div>
        </div>
      </div>
    </div>
    <div class="pv-bar">
      <div class="chips" id="pvChips"></div>
      <div class="tl"><div class="tl-p" id="tlP"></div></div>
      <span class="tl-i" id="tlI">入场 0.0s</span>
    </div>

    <!-- Output -->
    <div class="out open" id="outSec">
      <div class="out-head" onclick="document.getElementById('outSec').classList.toggle('open')">
        <span class="arr">&#9654;</span>
        <span class="oh-l">输出</span>
        <button class="btn-g" onclick="event.stopPropagation();copyJson()" style="font-size:9px;padding:2px 8px">复制</button>
      </div>
      <div class="out-body">
        <div class="out-tabs">
          <div class="ot on" onclick="stab('json',this)">JSON</div>
          <div class="ot" onclick="stab('readme',this)">README</div>
          <div class="ot" onclick="stab('cmd',this)">命令</div>
        </div>
        <div id="t-json" class="tc on"><div class="out-code" id="oJson"></div></div>
        <div id="t-readme" class="tc"><div class="out-code" id="oReadme"></div></div>
        <div id="t-cmd" class="tc"><div class="out-code" id="oCmd"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- === Bottom bar === -->
<div class="bot">
  <span class="bot-info" id="botInfo">9 项 · glitch</span>

<script id="srcBundle" type="application/json">{"src/effects/showcaseKit.ts":"/**\r\n * 全屏展示动画共享工具：时间编排、数学小工具、确定性随机/噪声。\r\n * 各类别（A–L）的展示合成共用这里的时序逻辑，但各自实现不同的入场/出场/堆栈。\r\n */\r\n\r\nexport const SEG = 48; // 每个方式占据\"主角\"的帧数\r\nexport const REVEAL_FRAC = 0.5; // 主角阶段中用于\"出现\"的比例\r\nexport const TAIL_SEG = 3; // 末尾留给最后一个方式沉淀为历史的额外段数\r\n\r\nexport const clamp01 = (x: number): number => Math.max(0, Math.min(1, x));\r\nexport const clamp = (x: number, lo: number, hi: number): number =>\r\n  Math.max(lo, Math.min(hi, x));\r\nexport const lerp = (a: number, b: number, p: number): number => a + (b - a) * p;\r\nexport const smoothstep = (edge0: number, edge1: number, x: number): number => {\r\n  const t = clamp01((x - edge0) / (edge1 - edge0));\r\n  return t * t * (3 - 2 * t);\r\n};\r\n\r\n/** 总时长（帧）：方式数 + 收尾段 */\r\nexport const totalFrames = (count: number): number => (count + TAIL_SEG) * SEG;\r\n\r\nexport type ItemTiming = {\r\n  /** 连续出场序数：d∈[0,1) 主角；d≥1 历史 */\r\n  d: number;\r\n  /** 离场/堆叠推进量 max(0, d-1) */\r\n  m: number;\r\n  /** 是否当前主角 */\r\n  isFeatured: boolean;\r\n  /** 主角阶段的出现进度（0→1，前 REVEAL_FRAC 完成） */\r\n  revealT: number;\r\n  /** 出场过渡 0→1（m 的前一段） */\r\n  move: number;\r\n};\r\n\r\nexport const itemTiming = (frame: number, index: number): ItemTiming => {\r\n  const d = (frame - index * SEG) / SEG;\r\n  const m = Math.max(0, d - 1);\r\n  return {\r\n    d,\r\n    m,\r\n    isFeatured: d >= 0 && d < 1,\r\n    revealT: clamp01(d / REVEAL_FRAC),\r\n    move: clamp01(m),\r\n  };\r\n};\r\n\r\n/** 确定性伪随机 ∈ [0,1)，以整数 seed 为种子（每帧一致，避免闪烁） */\r\nexport const rand = (seed: number): number => {\r\n  const s = Math.sin(seed * 127.1 + 311.7) * 43758.5453;\r\n  return s - Math.floor(s);\r\n};\r\n\r\n/** 二维种子随机 */\r\nexport const rand2 = (a: number, b: number): number => rand(a * 73.13 + b * 19.97);\r\n\r\n/** 一维平滑噪声 ∈ [-1,1] */\r\nexport const noise1 = (x: number): number => {\r\n  const i = Math.floor(x);\r\n  const f = x - i;\r\n  const u = f * f * (3 - 2 * f);\r\n  const a = rand(i) * 2 - 1;\r\n  const b = rand(i + 1) * 2 - 1;\r\n  return a + (b - a) * u;\r\n};\r\n\r\n/** easeOutBack：带过冲的缓出 */\r\nexport const easeOutBack = (t: number, s = 1.70158): number => {\r\n  const x = t - 1;\r\n  return 1 + (s + 1) * x * x * x + s * x * x;\r\n};\r\n\r\n/** easeInBack：带预备的缓入 */\r\nexport const easeInBack = (t: number, s = 1.70158): number =>\r\n  (s + 1) * t * t * t - s * t * t;\r\n\r\n/** easeOutCubic */\r\nexport const easeOutCubic = (t: number): number => 1 - Math.pow(1 - t, 3);\r\n\r\n/** easeOutElastic：到位后弹性振荡 */\r\nexport const easeOutElastic = (t: number): number => {\r\n  if (t === 0) return 0;\r\n  if (t === 1) return 1;\r\n  const c4 = (2 * Math.PI) / 3;\r\n  return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;\r\n};\r\n\r\nexport type ShowItem = {\r\n  id: number;\r\n  name: string;\r\n  enName: string;\r\n  formula: string;\r\n};\r\n","src/effects/opacityCurves.ts":"/**\r\n * A 类：透明度 · 多项式与指数曲线（方法 1–10）\r\n *\r\n * 每个函数输入归一化进度 t ∈ [0,1]，返回该曲线在该进度下的值。\r\n * 大多数返回 opacity ∈ [0,1]；个别（高斯闪现 / 双指数过冲）会返回\r\n * 额外的亮度 / 缩放等附加量，便于在组件中驱动多个样式属性。\r\n *\r\n * 对应参考文档：docs/font-entrance-effects-100.md  →  A. 透明度类（1–10）\r\n */\r\n\r\nexport const clamp01 = (x: number): number => Math.max(0, Math.min(1, x));\r\n\r\n/** 1. 线性淡入（Linear Fade）: opacity = t */\r\nexport const linearFade = (t: number): number => clamp01(t);\r\n\r\n/** 2. 二次淡入（Quadratic Ease-In）: opacity = t^2 */\r\nexport const quadraticEaseIn = (t: number): number => {\r\n  const x = clamp01(t);\r\n  return x * x;\r\n};\r\n\r\n/** 3. 三次缓出淡入（Cubic Ease-Out）: opacity = 1 - (1 - t)^3 */\r\nexport const cubicEaseOut = (t: number): number => {\r\n  const x = clamp01(t);\r\n  return 1 - Math.pow(1 - x, 3);\r\n};\r\n\r\n/** 4. 指数冲入（Exponential Ease-Out）: opacity = 1 - 2^(-10t) */\r\nexport const exponentialEaseOut = (t: number): number => {\r\n  const x = clamp01(t);\r\n  return x >= 1 ? 1 : 1 - Math.pow(2, -10 * x);\r\n};\r\n\r\n/** 5. 对数渐显（Logarithmic Reveal）: opacity = ln(1 + (e-1)·t) */\r\nexport const logarithmicReveal = (t: number): number => {\r\n  const x = clamp01(t);\r\n  return clamp01(Math.log(1 + (Math.E - 1) * x));\r\n};\r\n\r\n/**\r\n * 6. Sigmoid 渐显（Logistic S-Curve）: 1 / (1 + e^(-k(t-0.5)))\r\n * 做端点归一化，保证 t=0→0、t=1→1。\r\n */\r\nexport const sigmoidReveal = (t: number, k = 12): number => {\r\n  const x = clamp01(t);\r\n  const logistic = (v: number) => 1 / (1 + Math.exp(-k * (v - 0.5)));\r\n  const a = logistic(0);\r\n  const b = logistic(1);\r\n  return clamp01((logistic(x) - a) / (b - a));\r\n};\r\n\r\n/**\r\n * 7. 高斯脉冲闪现（Gaussian Flash-In）\r\n * 透明度走快速淡入；额外返回 brightness = 1 + A·e^(-((t-μ)^2)/(2σ^2))\r\n * 用于在出现瞬间过曝高亮一下再回落。\r\n */\r\nexport const gaussianFlashIn = (\r\n  t: number,\r\n  {amp = 1.6, mu = 0.3, sigma = 0.12}: {amp?: number; mu?: number; sigma?: number} = {}\r\n): {opacity: number; brightness: number} => {\r\n  const x = clamp01(t);\r\n  const opacity = cubicEaseOut(Math.min(1, x / 0.4));\r\n  const brightness = 1 + amp * Math.exp(-((x - mu) * (x - mu)) / (2 * sigma * sigma));\r\n  return {opacity, brightness};\r\n};\r\n\r\n/** 8. 伽马校正淡入（Gamma Fade）: opacity = t^(1/2.2) */\r\nexport const gammaFade = (t: number, gamma = 2.2): number => {\r\n  const x = clamp01(t);\r\n  return Math.pow(x, 1 / gamma);\r\n};\r\n\r\n/**\r\n * 9. 双指数过冲（Bi-Exponential Overshoot）\r\n * v = (1 - e^(-a t)) · (1 + b·e^(-c t))，先冲过 1 再回稳。\r\n * 同一个 v 同时驱动 opacity（限幅）与 scale（保留过冲）。\r\n */\r\nexport const biExponentialOvershoot = (\r\n  t: number,\r\n  {a = 6, b = 0.5, c = 9}: {a?: number; b?: number; c?: number} = {}\r\n): {opacity: number; scale: number} => {\r\n  const x = clamp01(t);\r\n  const v = (1 - Math.exp(-a * x)) * (1 + b * Math.exp(-c * x));\r\n  return {opacity: clamp01(v), scale: v};\r\n};\r\n\r\n/**\r\n * 10. 幂律阶梯淡入（Power-Step Fade）\r\n * 把进度量化成 k 段，每段内再套 t^2 平滑，呈\"分级点亮\"。\r\n */\r\nexport const powerStepFade = (t: number, steps = 5): number => {\r\n  const x = clamp01(t);\r\n  const stepIndex = Math.min(steps, Math.floor(x * steps));\r\n  const base = stepIndex / steps;\r\n  const frac = clamp01(x * steps - stepIndex);\r\n  const eased = base + (frac * frac) / steps;\r\n  return clamp01(eased);\r\n};\r\n\r\nexport type OpacityCurve = {\r\n  /** 序号（对应文档编号 1–10） */\r\n  id: number;\r\n  /** 中文名 */\r\n  name: string;\r\n  /** 英文名 */\r\n  enName: string;\r\n  /** 数学表达（用于在预览中展示） */\r\n  formula: string;\r\n  /**\r\n   * 给定归一化进度 t，返回该方法在该帧应用到文字上的样式片段。\r\n   */\r\n  apply: (t: number) => {\r\n    opacity: number;\r\n    transform?: string;\r\n    filter?: string;\r\n  };\r\n};\r\n\r\nexport const OPACITY_CURVES_A: OpacityCurve[] = [\r\n  {\r\n    id: 1,\r\n    name: '线性淡入',\r\n    enName: 'Linear Fade',\r\n    formula: 'opacity = t',\r\n    apply: (t) => ({opacity: linearFade(t)}),\r\n  },\r\n  {\r\n    id: 2,\r\n    name: '二次淡入',\r\n    enName: 'Quadratic Ease-In',\r\n    formula: 'opacity = t²',\r\n    apply: (t) => ({opacity: quadraticEaseIn(t)}),\r\n  },\r\n  {\r\n    id: 3,\r\n    name: '三次缓出',\r\n    enName: 'Cubic Ease-Out',\r\n    formula: 'opacity = 1 − (1 − t)³',\r\n    apply: (t) => ({opacity: cubicEaseOut(t)}),\r\n  },\r\n  {\r\n    id: 4,\r\n    name: '指数冲入',\r\n    enName: 'Exponential Ease-Out',\r\n    formula: 'opacity = 1 − 2^(−10t)',\r\n    apply: (t) => ({opacity: exponentialEaseOut(t)}),\r\n  },\r\n  {\r\n    id: 5,\r\n    name: '对数渐显',\r\n    enName: 'Logarithmic Reveal',\r\n    formula: 'opacity = ln(1 + (e−1)·t)',\r\n    apply: (t) => ({opacity: logarithmicReveal(t)}),\r\n  },\r\n  {\r\n    id: 6,\r\n    name: 'Sigmoid 渐显',\r\n    enName: 'Logistic S-Curve',\r\n    formula: 'opacity = 1 / (1 + e^(−k(t−0.5)))',\r\n    apply: (t) => ({opacity: sigmoidReveal(t)}),\r\n  },\r\n  {\r\n    id: 7,\r\n    name: '高斯闪现',\r\n    enName: 'Gaussian Flash-In',\r\n    formula: 'b = 1 + A·e^(−(t−μ)²/2σ²)',\r\n    apply: (t) => {\r\n      const {opacity, brightness} = gaussianFlashIn(t);\r\n      return {opacity, filter: `brightness(${brightness})`};\r\n    },\r\n  },\r\n  {\r\n    id: 8,\r\n    name: '伽马淡入',\r\n    enName: 'Gamma Fade',\r\n    formula: 'opacity = t^(1/2.2)',\r\n    apply: (t) => ({opacity: gammaFade(t)}),\r\n  },\r\n  {\r\n    id: 9,\r\n    name: '双指数过冲',\r\n    enName: 'Bi-Exponential Overshoot',\r\n    formula: 'v = (1−e^(−at))(1+b·e^(−ct))',\r\n    apply: (t) => {\r\n      const {opacity, scale} = biExponentialOvershoot(t);\r\n      return {opacity, transform: `scale(${scale})`};\r\n    },\r\n  },\r\n  {\r\n    id: 10,\r\n    name: '幂律阶梯',\r\n    enName: 'Power-Step Fade',\r\n    formula: 'opacity = ⌊t·k⌋/k (段内 t²)',\r\n    apply: (t) => ({opacity: powerStepFade(t)}),\r\n  },\r\n];\r\n","src/effects/categories.ts":"import {ShowItem} from './showcaseKit';\r\n\r\n/**\r\n * B–L 各类别的方式清单（名称 / 英文名 / 公式），用于全屏展示中的主角文字与说明。\r\n * 对应 docs/font-entrance-effects-100.md 的编号 11–100。\r\n */\r\n\r\nexport const CATEGORY_B: ShowItem[] = [\r\n  {id: 11, name: '上移淡入', enName: 'Slide-Up Fade', formula: 'y=lerp(50,0,easeOut)'},\r\n  {id: 12, name: '回退超调滑入', enName: 'Back Ease', formula: 'easeOutBack(t)'},\r\n  {id: 13, name: '弹性滑入', enName: 'Elastic Slide', formula: '2^(-10t)·sin(...)'},\r\n  {id: 14, name: '重力下坠', enName: 'Gravity Drop', formula: 'y=½·g·t²'},\r\n  {id: 15, name: '抛物线抛入', enName: 'Projectile Toss', formula: 'y=h·4t(1-t)'},\r\n  {id: 16, name: '阻尼回正', enName: 'Damped Settle', formula: 'A·e^(-ζt)·cos(ωt)'},\r\n  {id: 17, name: '速度模糊滑入', enName: 'Motion-Blur Slide', formula: 'blur=k·|v|'},\r\n  {id: 18, name: '惯性甩入', enName: 'Inertia Whip', formula: 'easeOutExpo + skew'},\r\n  {id: 19, name: '磁吸归位', enName: 'Magnetic Snap', formula: 'pos+=(t-pos)·k'},\r\n  {id: 20, name: '折线入场', enName: 'Polyline Path-In', formula: '分段折线插值'},\r\n];\r\n\r\nexport const CATEGORY_C: ShowItem[] = [\r\n  {id: 21, name: '弹簧弹出', enName: 'Spring Pop', formula: 'spring(scale 0→1)'},\r\n  {id: 22, name: '挤压拉伸', enName: 'Squash & Stretch', formula: 'sX·sY=const'},\r\n  {id: 23, name: '旋转缩放螺入', enName: 'Rotate-Zoom Spiral', formula: 'rot:180°→0°'},\r\n  {id: 24, name: '透视纵深推入', enName: 'Z-Push Perspective', formula: 'translateZ:-800→0'},\r\n  {id: 25, name: '焦点拉近', enName: 'Dolly Zoom', formula: 'scale↑·persp↓'},\r\n  {id: 26, name: '翻牌立体', enName: '3D Card Flip', formula: 'rotateY:90°→0°'},\r\n  {id: 27, name: '折纸展开', enName: 'Origami Unfold', formula: 'rotateX 分段'},\r\n  {id: 28, name: '镜像对开', enName: 'Mirror Split Open', formula: '上下半分'},\r\n  {id: 29, name: '厚度生长', enName: 'Extrude Grow', formula: 'K=round(maxK·t)'},\r\n  {id: 30, name: '弹性拉伸归位', enName: 'Elastic Stretch', formula: 'sY=1+(S-1)·elastic'},\r\n];\r\n\r\nexport const CATEGORY_D: ShowItem[] = [\r\n  {id: 31, name: '模糊聚焦', enName: 'Blur-to-Focus', formula: 'blur:16→0'},\r\n  {id: 32, name: '失焦呼吸', enName: 'Focus Breathing', formula: 'blur=|sin(πtn)|A(1-t)'},\r\n  {id: 33, name: '墨水晕染', enName: 'Ink Bleed', formula: 'blur=20(1-t)²'},\r\n  {id: 34, name: '辉光绽放', enName: 'Glow Bloom', formula: 'shadowBlur=A·e^(-kt)'},\r\n  {id: 35, name: '色差散焦', enName: 'Chromatic Aberration', formula: 'Δ=D(1-t)'},\r\n  {id: 36, name: '半调网点', enName: 'Halftone Develop', formula: 'r=R(1-t)'},\r\n  {id: 37, name: '像素化解析', enName: 'Pixelate Resolve', formula: 'b=round(B(1-t))+1'},\r\n  {id: 38, name: '热浪扭曲', enName: 'Heat-Haze Reveal', formula: 'd=noise(xf+t)A(1-t)'},\r\n];\r\n\r\nexport const CATEGORY_E: ShowItem[] = [\r\n  {id: 39, name: '正弦行波', enName: 'Traveling Sine', formula: 'y=A·sin(2πfu-ωt)'},\r\n  {id: 40, name: '余弦摆入', enName: 'Cosine Pendulum', formula: 'θ₀·cos(ωt)·e^(-kt)'},\r\n  {id: 41, name: '驻波涟漪', enName: 'Standing Wave', formula: 'A·sin(ku)cos(ωt)'},\r\n  {id: 42, name: '心跳脉动', enName: 'Heartbeat Pulse', formula: '1+A(sinωt+½sin2ωt)'},\r\n  {id: 43, name: '正切骤变', enName: 'Tangent Snap', formula: 'y=A·tan((t-.5)θ)'},\r\n  {id: 44, name: '李萨如聚合', enName: 'Lissajous Gather', formula: 'sin(aφ+δ),sin(bφ)'},\r\n  {id: 45, name: '阻尼正弦定格', enName: 'Damped Sine', formula: 'A·e^(-ζt)·sin(ωt+φ)'},\r\n  {id: 46, name: '拍频闪烁', enName: 'Beat Flicker', formula: 'cos(2πf₁t)cos(2πf₂t)'},\r\n  {id: 47, name: '螺旋极坐标', enName: 'Polar Spiral-In', formula: 'r=R(1-t),θ=θ₀+kt'},\r\n  {id: 48, name: '波纹扩散', enName: 'Ripple Expand', formula: 'delay=dist·c'},\r\n  {id: 49, name: '旗帜飘动', enName: 'Flag Wave', formula: 'A·sin(ku-ωt)(1-t)'},\r\n  {id: 50, name: '摆线滚入', enName: 'Cycloid Roll-In', formula: 'x=R(φ-sinφ)'},\r\n];\r\n\r\nexport const CATEGORY_F: ShowItem[] = [\r\n  {id: 51, name: '打字机', enName: 'Typewriter', formula: 'n=floor(t·N)'},\r\n  {id: 52, name: '线性交错', enName: 'Linear Stagger', formula: 'delay(i)=i·d'},\r\n  {id: 53, name: '居中开花', enName: 'Center-Out Bloom', formula: 'delay=|i-N/2|·d'},\r\n  {id: 54, name: '随机浮现', enName: 'Random Stagger', formula: 'delay=rand(i)·D'},\r\n  {id: 55, name: '高斯交错', enName: 'Gaussian Stagger', formula: '∝1-e^(-(u-.5)²/2σ²)'},\r\n  {id: 56, name: '逐字波浪', enName: 'Per-Char Wave', formula: 'y=A·sin(ωt-iΔφ)'},\r\n  {id: 57, name: '多米诺翻倒', enName: 'Domino Topple', formula: 'rot=90°(1-τ)'},\r\n  {id: 58, name: '字距收拢', enName: 'Spacing Collapse', formula: 'spacing=lerp(W,0,t)'},\r\n  {id: 59, name: '逐行上推', enName: 'Line Mask Up', formula: 'y:100%→0'},\r\n  {id: 60, name: '词级弹入', enName: 'Word Pop', formula: 'delay(w)=w·d'},\r\n  {id: 61, name: '卷帘百叶', enName: 'Vertical Blinds', formula: 'scaleX:0→1'},\r\n  {id: 62, name: '蛇形进场', enName: 'Boustrophedon', formula: '蛇形重排 delay'},\r\n];\r\n\r\nexport const CATEGORY_G: ShowItem[] = [\r\n  {id: 63, name: '横向擦除', enName: 'Horizontal Wipe', formula: 'inset(0 (100(1-p))% 0 0)'},\r\n  {id: 64, name: '对角揭示', enName: 'Diagonal Reveal', formula: 'polygon(...) 推进'},\r\n  {id: 65, name: '圆形光圈', enName: 'Circular Iris', formula: 'circle(p·150%)'},\r\n  {id: 66, name: '马赛克揭示', enName: 'Mosaic Reveal', formula: 'delay=rand(r,c)·D'},\r\n  {id: 67, name: '扫描线显影', enName: 'Scanline Develop', formula: 'y<lerp(0,H,t)'},\r\n  {id: 68, name: '形状蒙版', enName: 'SVG Mask Grow', formula: 'mask scale=p'},\r\n  {id: 69, name: '笔画手写', enName: 'Handwriting', formula: 'dashoffset=L(1-p)'},\r\n  {id: 70, name: '液面上涨', enName: 'Liquid Fill Up', formula: 'h=lerp(0,H,p)'},\r\n];\r\n\r\nexport const CATEGORY_H: ShowItem[] = [\r\n  {id: 71, name: '噪声抖动收敛', enName: 'Noise Jitter Settle', formula: 'noise(i,tf)·A(1-t)'},\r\n  {id: 72, name: '乱码解码', enName: 'Scramble / Decode', formula: 'lock(i)=i·d'},\r\n  {id: 73, name: '沙化重组', enName: 'Sand Reform', formula: 'lerp(rand,target,t)'},\r\n  {id: 74, name: '概率点亮', enName: 'Stochastic Light-Up', formula: 'rand(i)<t'},\r\n  {id: 75, name: '布朗漂入', enName: 'Brownian Drift-In', formula: 'pos+=randn·σ(1-t)'},\r\n  {id: 76, name: '泊松雨滴', enName: 'Poisson Rain', formula: '间隔~Exp(λ)'},\r\n  {id: 77, name: '噪声场流入', enName: 'Curl-Noise Flow', formula: 'v=curl(noise)(1-t)'},\r\n  {id: 78, name: '信噪比上升', enName: 'SNR Rise', formula: 'lerp(noise,glyph,t)'},\r\n  {id: 79, name: '抖动溶解', enName: 'Dither Dissolve', formula: 'bayer(x,y)<t'},\r\n  {id: 80, name: '量子坍缩', enName: 'Quantum Collapse', formula: 'softmax→target'},\r\n];\r\n\r\nexport const CATEGORY_I: ShowItem[] = [\r\n  {id: 81, name: '粒子聚合', enName: 'Particle Assemble', formula: 'lerp(spawn,glyph,t)'},\r\n  {id: 82, name: '破碎逆放', enName: 'Reverse Shatter', formula: 'lerp(scatter,0,p)'},\r\n  {id: 83, name: '冲击波成形', enName: 'Shockwave Form', formula: 'dist<R(t)'},\r\n  {id: 84, name: '烟雾凝结', enName: 'Smoke Condense', formula: '扩散半径∝(1-t)'},\r\n  {id: 85, name: '磁粉吸附', enName: 'Ferrofluid Pull', formula: '沿法线·noise·p'},\r\n  {id: 86, name: '体素堆叠', enName: 'Voxel Stack-Up', formula: 'delay=(y+rand)·d'},\r\n  {id: 87, name: '拉链合拢', enName: 'Zipper Merge', formula: 'x=±X(1-easeInOut)'},\r\n  {id: 88, name: '细胞增殖', enName: 'Mitosis Spawn', formula: 'N=2^(floor(tk))'},\r\n];\r\n\r\nexport const CATEGORY_J: ShowItem[] = [\r\n  {id: 89, name: '色相旋转', enName: 'Hue-Rotate In', formula: 'hue=lerp(360n,0,t)'},\r\n  {id: 90, name: '流光扫光', enName: 'Gradient Sweep', formula: 'bgPos:-100%→200%'},\r\n  {id: 91, name: '冷暖渐变', enName: 'Blackbody Warm-Up', formula: '色温 T(t)'},\r\n  {id: 92, name: '投影成形', enName: 'Long-Shadow Cast', formula: 'L=lerp(Lmax,L0,p)'},\r\n  {id: 93, name: '光照浮雕', enName: 'Lighting Emboss', formula: 'max(0,N·L(t))'},\r\n  {id: 94, name: '霓虹点亮', enName: 'Neon Sequential', formula: 'seg delay=k·d'},\r\n];\r\n\r\nexport const CATEGORY_K: ShowItem[] = [\r\n  {id: 95, name: 'RGB撕裂故障', enName: 'Glitch Tear', formula: 'step(rand(y,t)-θ)·D'},\r\n  {id: 96, name: '数据流下落', enName: 'Datamosh Cascade', formula: 'y=lerp(-H,0,easeOut)'},\r\n  {id: 97, name: '方波频闪', enName: 'Square-Wave Strobe', formula: 'sin(ωt)>0?1:0'},\r\n];\r\n\r\nexport const CATEGORY_L: ShowItem[] = [\r\n  {id: 98, name: '分形递归展开', enName: 'Fractal Unfold', formula: 'L 层∈[L/Lmax,...]'},\r\n  {id: 99, name: '混沌吸引子归位', enName: 'Attractor Settle', formula: '洛伦兹·(1-t)'},\r\n  {id: 100, name: '逻辑斯蒂分岔', enName: 'Logistic Bifurcation', formula: 'x_{n+1}=r·x_n(1-x_n)'},\r\n];\r\n","src/textfx/types.ts":"import React from 'react';\r\n\r\n/**\r\n * 文字特效解耦架构 —— 类型定义\r\n *\r\n * 核心思想：把\"动效原子\"（一段文字怎么进/怎么出）与\"场景编排\"（这段文字\r\n * 在镜头里扮演什么角色、怎么布局、停留多久、是否堆叠）彻底分离。\r\n *\r\n *  - TextEffect：纯入场/出场原子，只描述单段文字的视觉，不含任何布局/堆栈。\r\n *  - Scene（见 ./scenes）：上层模板，负责位置、字号、配色、时间编排与多段共存方式，\r\n *    可以接入任意一个 TextEffect。\r\n */\r\n\r\n/** 动效阶段：入场 or 出场。hold（停留）= 用 phase='in', t=1 取稳定态。 */\r\nexport type Phase = 'in' | 'out';\r\n\r\nexport type EffectVisualArgs = {\r\n  /** 要呈现的文字 */\r\n  text: string;\r\n  /** 当前阶段 */\r\n  phase: Phase;\r\n  /**\r\n   * 阶段内归一化进度 t ∈ [0,1]\r\n   *  - phase='in'：0 = 刚开始入场（屏外/不可见），1 = 完全到位\r\n   *  - phase='out'：0 = 稳定态，1 = 完全离场（消失）\r\n   */\r\n  t: number;\r\n  /** 全局帧号，用于持续性的噪声/抖动/振荡 */\r\n  frame: number;\r\n  /** 该段文字的确定性种子（同一段每帧一致，避免闪烁） */\r\n  seed: number;\r\n};\r\n\r\nexport type EffectVisual = {\r\n  /** 作用在文字外层容器上的样式（transform / filter / opacity 等） */\r\n  wrapper?: React.CSSProperties;\r\n  /** 自定义内容渲染（逐字 / 粒子 / 乱码等）；省略则由场景渲染纯文字 */\r\n  content?: React.ReactNode;\r\n};\r\n\r\nexport type TextEffect = {\r\n  /** 编号（对应文档 1–100） */\r\n  id: number;\r\n  /** 所属类别 A–L */\r\n  category: string;\r\n  /** 中文名 */\r\n  name: string;\r\n  /** 英文名 */\r\n  enName: string;\r\n  /** 数学表达 */\r\n  formula: string;\r\n  /** 给定阶段与进度，返回该段文字的视觉片段 */\r\n  visual: (args: EffectVisualArgs) => EffectVisual;\r\n};\r\n","src/textfx/shared.tsx":"import React from 'react';\r\nimport {Phase} from './types';\r\n\r\nexport {\r\n  clamp01,\r\n  clamp,\r\n  lerp,\r\n  smoothstep,\r\n  rand,\r\n  rand2,\r\n  noise1,\r\n  easeOutBack,\r\n  easeInBack,\r\n  easeOutCubic,\r\n  easeOutElastic,\r\n} from '../effects/showcaseKit';\r\n\r\nimport {clamp01, lerp, easeOutCubic, rand2} from '../effects/showcaseKit';\r\n\r\n/** 场景默认字体族（中英文兼容）。 */\r\nexport const DEFAULT_FONT_FAMILY = 'Arial, \"PingFang SC\", \"Microsoft YaHei\", sans-serif';\r\n\r\n/** 水平对齐 → flex 主轴/CSS textAlign。 */\r\nexport const alignToFlex = (a?: 'left' | 'center' | 'right'): 'flex-start' | 'center' | 'flex-end' =>\r\n  a === 'left' ? 'flex-start' : a === 'right' ? 'flex-end' : 'center';\r\n\r\n/** 垂直对齐 → flex 主轴。 */\r\nexport const vAlignToFlex = (a?: 'top' | 'center' | 'bottom'): 'flex-start' | 'center' | 'flex-end' =>\r\n  a === 'top' ? 'flex-start' : a === 'bottom' ? 'flex-end' : 'center';\r\n\r\n/**\r\n * 按当前阶段挑选该段文字应使用的原子编号：\r\n *  - phase='out'：outEffectId ?? effectId\r\n *  - 否则（in/hold）：inEffectId ?? effectId\r\n * 让入场与出场可以分别指定不同原子；缺省时两端共用 effectId（向后兼容）。\r\n */\r\nexport const pickPhaseEffectId = (\r\n  e: {effectId: number; inEffectId?: number; outEffectId?: number},\r\n  phase: Phase\r\n): number => (phase === 'out' ? e.outEffectId ?? e.effectId : e.inEffectId ?? e.effectId);\r\n\r\n/**\r\n * 在场度 presence ∈ [0,1]：1 = 完全到位（稳定态），0 = 完全缺席。\r\n *  - phase='in'：presence = ease(t)\r\n *  - phase='out'：presence = 1 - ease(t)\r\n * 大多数原子的视觉都可写成 presence 的函数，从而自动同时得到入场与出场。\r\n */\r\nexport const presence = (\r\n  phase: Phase,\r\n  t: number,\r\n  ease: (x: number) => number = easeOutCubic\r\n): number => (phase === 'in' ? ease(clamp01(t)) : 1 - ease(clamp01(t)));\r\n\r\n/** 确定性正态近似（Box-Muller 简化），种子一致 */\r\nexport const randn = (seed: number): number => {\r\n  const u1 = Math.max(1e-6, rand2(seed, 1.1));\r\n  const u2 = rand2(seed, 2.2);\r\n  return Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);\r\n};\r\n\r\n/** 逐字渲染：charStyle 给每个字符返回样式（用于交错/波浪/多米诺/粒子散入等） */\r\nexport const PerChar: React.FC<{\r\n  text: string;\r\n  charStyle: (i: number, N: number) => React.CSSProperties;\r\n  charWrap?: (i: number, N: number) => React.CSSProperties;\r\n}> = ({text, charStyle, charWrap}) => {\r\n  const chars = Array.from(text);\r\n  const N = chars.length;\r\n  return (\r\n    <>\r\n      {chars.map((ch, i) => (\r\n        <span\r\n          key={i}\r\n          style={{display: 'inline-block', whiteSpace: 'pre', ...charWrap?.(i, N)}}\r\n        >\r\n          <span style={{display: 'inline-block', ...charStyle(i, N)}}>\r\n            {ch === ' ' ? '\\u00A0' : ch}\r\n          </span>\r\n        </span>\r\n      ))}\r\n    </>\r\n  );\r\n};\r\n\r\nconst GLYPHS = 'アカサタナ01XΞΨ#%&@王金木水火土π∑∆◇▦';\r\nexport const randGlyph = (seed: number): string =>\r\n  GLYPHS[Math.floor(rand2(Math.floor(seed), 7.3) * GLYPHS.length)] ?? '#';\r\n\r\n/** 乱码解码渲染：随进度逐字锁定为真字 */\r\nexport const Scramble: React.FC<{\r\n  text: string;\r\n  a: number; // 0→1 解码进度\r\n  frame: number;\r\n  seed: number;\r\n  scrambleColor?: string;\r\n}> = ({text, a, frame, seed, scrambleColor = '#ff4d6d'}) => {\r\n  const chars = Array.from(text);\r\n  const N = chars.length;\r\n  return (\r\n    <>\r\n      {chars.map((ch, i) => {\r\n        const lock = (i / Math.max(N, 1)) * 0.85;\r\n        const locked = a > lock + 0.12;\r\n        return (\r\n          <span key={i} style={{color: locked ? 'inherit' : scrambleColor}}>\r\n            {locked ? ch : randGlyph(frame * 0.5 + i * 31 + seed)}\r\n          </span>\r\n        );\r\n      })}\r\n    </>\r\n  );\r\n};\r\n","src/textfx/library.tsx":"import React from 'react';\r\nimport {EffectVisual, EffectVisualArgs, TextEffect} from './types';\r\nimport {\r\n  clamp01,\r\n  lerp,\r\n  easeOutCubic,\r\n  easeOutBack,\r\n  easeOutElastic,\r\n  noise1,\r\n  rand2,\r\n  randn,\r\n  presence,\r\n  PerChar,\r\n  Scramble,\r\n} from './shared';\r\nimport {OPACITY_CURVES_A} from '../effects/opacityCurves';\r\nimport {\r\n  CATEGORY_B,\r\n  CATEGORY_C,\r\n  CATEGORY_D,\r\n  CATEGORY_E,\r\n  CATEGORY_F,\r\n  CATEGORY_G,\r\n  CATEGORY_H,\r\n  CATEGORY_I,\r\n  CATEGORY_J,\r\n  CATEGORY_K,\r\n  CATEGORY_L,\r\n} from '../effects/categories';\r\n\r\n/** 线性在场进度：in→t, out→1-t（用于逐字交错/解码等） */\r\nconst appear = (a: EffectVisualArgs): number =>\r\n  a.phase === 'in' ? clamp01(a.t) : clamp01(1 - a.t);\r\n\r\n/** 逐字局部进度：全局 g∈[0,1]，第 i 个字符在 [start, start+spread] 内 0→1 */\r\nconst stagger = (g: number, i: number, N: number, spread = 0.45): number => {\r\n  const start = (i / Math.max(N - 1, 1)) * (1 - spread);\r\n  return clamp01((g - start) / spread);\r\n};\r\n\r\ntype Builder = (a: EffectVisualArgs) => EffectVisual;\r\n\r\nconst B: Record<number, Builder> = {\r\n  11: (a) => {\r\n    const p = presence(a.phase, a.t);\r\n    return {wrapper: {opacity: clamp01(p * 1.4), transform: `translateY(${(1 - p) * 64}px)`}};\r\n  },\r\n  12: (a) => {\r\n    const p = presence(a.phase, a.t, easeOutBack);\r\n    return {wrapper: {opacity: clamp01(a.phase === 'in' ? a.t * 1.6 : (1 - a.t) * 1.6), transform: `translateX(${(1 - p) * -180}px)`}};\r\n  },\r\n  13: (a) => {\r\n    const p = presence(a.phase, a.t, easeOutElastic);\r\n    return {wrapper: {opacity: clamp01(a.phase === 'in' ? a.t * 2 : (1 - a.t) * 2), transform: `translateX(${(1 - p) * 220}px)`}};\r\n  },\r\n  14: (a) => {\r\n    const e = (x: number) => x * x;\r\n    const p = presence(a.phase, a.t, e);\r\n    return {wrapper: {opacity: clamp01((a.phase === 'in' ? a.t : 1 - a.t) * 3), transform: `translateY(${(p - 1) * 520}px)`}};\r\n  },\r\n  15: (a) => {\r\n    const p = presence(a.phase, a.t);\r\n    return {wrapper: {opacity: p, transform: `translate(${(1 - p) * -320}px, ${-Math.sin(p * Math.PI) *
