GORY_D),\r\n  ...catFx('E', CATEGORY_E),\r\n  ...catFx('F', CATEGORY_F),\r\n  ...catFx('G', CATEGORY_G),\r\n  ...catFx('H', CATEGORY_H),\r\n  ...catFx('I', CATEGORY_I),\r\n  ...catFx('J', CATEGORY_J),\r\n  ...catFx('K', CATEGORY_K),\r\n  ...catFx('L', CATEGORY_L),\r\n];\r\n\r\nexport const EFFECT_BY_ID: Record<number, TextEffect> = Object.fromEntries(\r\n  EFFECTS.map((e) => [e.id, e])\r\n);\r\n\r\nexport const effectById = (id: number): TextEffect => EFFECT_BY_ID[id] ?? EFFECTS[0];\r\n","src/textfx/TextFx.tsx":"import React from 'react';\r\nimport {Phase, TextEffect} from './types';\r\n\r\n/**\r\n * 把一个「动效原子」渲染成一段文字。场景只负责定位/字号/配色（baseStyle），\r\n * 效果只负责进/出的视觉（wrapper + content）。两者在此组合。\r\n */\r\nexport const TextFx: React.FC<{\r\n  effect: TextEffect;\r\n  text: string;\r\n  phase: Phase;\r\n  t: number;\r\n  frame: number;\r\n  seed?: number;\r\n  baseStyle?: React.CSSProperties;\r\n}> = ({effect, text, phase, t, frame, seed = 1, baseStyle}) => {\r\n  const v = effect.visual({text, phase, t, frame, seed});\r\n  return (\r\n    <span style={{display: 'inline-block', whiteSpace: 'nowrap', ...baseStyle, ...v.wrapper}}>\r\n      {v.content ?? text}\r\n    </span>\r\n  );\r\n};\r\n","src/textfx/schemas.ts":"import {z} from 'zod';\r\n\r\n/**\r\n * 各场景的 props schema。其他 AI / 调用方可据此构造 `--props='{...}'` JSON，\r\n * 零改代码渲染任意文字 + 任意动效原子（effectId ∈ [1,100]）。\r\n */\r\n\r\nexport const effectIdSchema = z.number().int().min(1).max(100);\r\n\r\n/**\r\n * 一段文字引用的动效原子。`effectId` 为基准；可选 `inEffectId`/`outEffectId`\r\n * 分别覆盖入场/出场（缺省时两端都用 `effectId`）。这让主题/配置能独立切换进出。\r\n */\r\nexport const effectRefShape = {\r\n  effectId: effectIdSchema,\r\n  inEffectId: effectIdSchema.optional(),\r\n  outEffectId: effectIdSchema.optional(),\r\n};\r\n\r\nexport const alignSchema = z.enum(['left', 'center', 'right']);\r\nexport const vAlignSchema = z.enum(['top', 'center', 'bottom']);\r\n\r\n/**\r\n * 通用排版/位置参数（全部可选，缺省即用各场景的现有默认值）。\r\n * 让调用方零改代码即可定义字重 / 字体 / 字间距 / 对齐 / 位置偏移。\r\n */\r\nexport const styleSchema = z.object({\r\n  fontWeight: z.number().int().positive().optional(),\r\n  fontFamily: z.string().optional(),\r\n  letterSpacing: z.number().optional(),\r\n  align: alignSchema.optional(),\r\n  offsetX: z.number().optional(),\r\n  offsetY: z.number().optional(),\r\n  showLabel: z.boolean().optional(),\r\n});\r\nexport type StyleProps = z.infer<typeof styleSchema>;\r\n\r\nexport const timingSchema = z.object({\r\n  inF: z.number().int().positive(),\r\n  holdF: z.number().int().nonnegative(),\r\n  outF: z.number().int().positive(),\r\n});\r\nexport type Timing = z.infer<typeof timingSchema>;\r\n\r\nexport const heroSchema = z\r\n  .object({\r\n    entries: z.array(\r\n      z.object({text: z.string(), sub: z.string().optional(), ...effectRefShape})\r\n    ),\r\n    timing: timingSchema,\r\n    background: z.string(),\r\n    color: z.string(),\r\n    fontSize: z.number().positive(),\r\n  })\r\n  .merge(styleSchema)\r\n  .extend({\r\n    vAlign: vAlignSchema.optional(),\r\n    subSize: z.number().positive().optional(),\r\n    subColor: z.string().optional(),\r\n  });\r\nexport type HeroProps = z.infer<typeof heroSchema>;\r\n\r\nexport const captionSchema = z.object({\r\n  lines: z.array(z.object({text: z.string(), ...effectRefShape})),\r\n  timing: timingSchema,\r\n  background: z.string(),\r\n  barColor: z.string(),\r\n  color: z.string(),\r\n  fontSize: z.number().positive(),\r\n}).merge(styleSchema);\r\nexport type CaptionProps = z.infer<typeof captionSchema>;\r\n\r\nexport const listSchema = z.object({\r\n  title: z.string(),\r\n  items: z.array(z.object({text: z.string(), ...effectRefShape})),\r\n  stepFrames: z.number().int().positive(),\r\n  inFrames: z.number().int().positive(),\r\n  background: z.string(),\r\n  color: z.string(),\r\n  fontSize: z.number().positive(),\r\n}).merge(styleSchema);\r\nexport type ListProps = z.infer<typeof listSchema>;\r\n\r\nexport const lowerThirdSchema = z.object({\r\n  entries: z.array(\r\n    z.object({name: z.string(), role: z.string(), ...effectRefShape})\r\n  ),\r\n  timing: timingSchema,\r\n  background: z.string(),\r\n  accent: z.string(),\r\n}).merge(styleSchema);\r\nexport type LowerThirdProps = z.infer<typeof lowerThirdSchema>;\r\n\r\nexport const emphasisSchema = z.object({\r\n  lines: z.array(\r\n    z.object({\r\n      pre: z.string(),\r\n      token: z.string(),\r\n      post: z.string(),\r\n      ...effectRefShape,\r\n      accent: z.string().optional(),\r\n    })\r\n  ),\r\n  timing: timingSchema,\r\n  background: z.string(),\r\n  color: z.string(),\r\n  fontSize: z.number().positive(),\r\n}).merge(styleSchema);\r\nexport type EmphasisProps = z.infer<typeof emphasisSchema>;\r\n\r\nexport const gallerySchema = z.object({\r\n  effectIds: z.array(effectIdSchema),\r\n  background: z.string(),\r\n  color: z.string(),\r\n  fontSize: z.number().positive(),\r\n}).merge(styleSchema);\r\nexport type GalleryProps = z.infer<typeof gallerySchema>;\r\n\r\nexport const thumbSchema = z.object({\r\n  effectId: effectIdSchema,\r\n  background: z.string(),\r\n  color: z.string(),\r\n  fontSize: z.number().positive(),\r\n});\r\nexport type ThumbProps = z.infer<typeof thumbSchema>;\r\n\r\nexport const wallSchema = z.object({\r\n  effectIds: z.array(effectIdSchema),\r\n  columns: z.number().int().positive(),\r\n  loopFrames: z.number().int().positive(),\r\n  background: z.string(),\r\n  color: z.string(),\r\n});\r\nexport type WallProps = z.infer<typeof wallSchema>;\r\n\r\n/** 多场景串联成片：每个片段 = {type, props}。 */\r\nexport const segmentSchema = z.discriminatedUnion('type', [\r\n  z.object({type: z.literal('hero'), props: heroSchema}),\r\n  z.object({type: z.literal('caption'), props: captionSchema}),\r\n  z.object({type: z.literal('list'), props: listSchema}),\r\n  z.object({type: z.literal('lowerThird'), props: lowerThirdSchema}),\r\n  z.object({type: z.literal('emphasis'), props: emphasisSchema}),\r\n  z.object({type: z.literal('gallery'), props: gallerySchema}),\r\n]);\r\nexport type ReelSegment = z.infer<typeof segmentSchema>;\r\n\r\nexport const reelSchema = z.object({segments: z.array(segmentSchema)});\r\nexport type ReelProps = z.infer<typeof reelSchema>;\r\n\r\n/** 时长计算（帧）。供 Remotion calculateMetadata 使用。 */\r\nconst slot = (t: Timing): number => t.inF + t.holdF + t.outF;\r\n\r\nexport const heroFrames = (p: {entries: unknown[]; timing: Timing}): number =>\r\n  Math.max(1, p.entries.length) * slot(p.timing);\r\nexport const captionFrames = (p: {lines: unknown[]; timing: Timing}): number =>\r\n  Math.max(1, p.lines.length) * slot(p.timing);\r\nexport const lowerThirdFrames = (p: {entries: unknown[]; timing: Timing}): number =>\r\n  Math.max(1, p.entries.length) * slot(p.timing);\r\nexport const emphasisFrames = (p: {lines: unknown[]; timing: Timing}): number =>\r\n  Math.max(1, p.lines.length) * slot(p.timing);\r\nexport const listFrames = (p: {items: unknown[]; stepFrames: number; inFrames: number}): number =>\r\n  Math.max(0, p.items.length - 1) * p.stepFrames + p.inFrames + 30;\r\nexport const galleryFrames = (p: {effectIds: number[]}): number => (p.effectIds.length + 3) * 40;\r\nexport const wallFrames = (p: {loopFrames: number}): number => p.loopFrames * 2;\r\n\r\nexport const segmentFrames = (s: ReelSegment): number => {\r\n  switch (s.type) {\r\n    case 'hero':\r\n      return heroFrames(s.props);\r\n    case 'caption':\r\n      return captionFrames(s.props);\r\n    case 'list':\r\n      return listFrames(s.props);\r\n    case 'lowerThird':\r\n      return lowerThirdFrames(s.props);\r\n    case 'emphasis':\r\n      return emphasisFrames(s.props);\r\n    case 'gallery':\r\n      return galleryFrames(s.props);\r\n  }\r\n};\r\n\r\nexport const reelFrames = (p: {segments: ReelSegment[]}): number =>\r\n  Math.max(1, p.segments.reduce((acc, s) => acc + segmentFrames(s), 0));\r\n","src/textfx/themes.ts":"import {z} from 'zod';\r\nimport {effectIdSchema, timingSchema, Timing, ReelProps, ReelSegment, reelFrames} from './schemas';\r\n\r\n/**\r\n * 主题（Theme）= 一套\"协调的动效语言\"。\r\n *\r\n * 痛点：标题选了某个原子后，其他场景该配什么才\"成套\"？逐场景手挑很慢、还容易割裂。\r\n * 方案：主题把「每个场景角色用哪个入场/出场原子 + 共享配色/字体/节奏」一次性定义好。\r\n * 选一个主题名（如 `glitch`）即可一键生成整套协调的多场景成片（Reel）。\r\n *\r\n * 主题负责\"快速选出最接近想要的那套\"；之后可在 themeConfig 里逐场景覆盖来微调\r\n * （配置前端 P2 即基于此层）。\r\n *\r\n * 注意：原子的随机性（乱码/噪声）使用确定性种子，同样的配置每次渲染结果一致。\r\n */\r\n\r\n/** 主题覆盖到的场景角色（Gallery 是\"陈列整库\"的特定场景，不参与主题）。 */\r\nexport const themeRoles = ['hero', 'list', 'lowerThird', 'caption', 'emphasis'] as const;\r\nexport type ThemeRole = (typeof themeRoles)[number];\r\n\r\n/** 一个场景角色的入场/出场原子选择。 */\r\nexport type EffectChoice = {inEffectId: number; outEffectId: number};\r\n\r\n/** 主题的共享视觉语言（配色 / 字体 / 字重 / 字间距）。 */\r\nexport type ThemeStyle = {\r\n  background: string;\r\n  color: string;\r\n  accent: string;\r\n  barColor: string;\r\n  fontFamily: string;\r\n  fontWeight: number;\r\n  letterSpacing: number;\r\n};\r\n\r\nexport type Theme = {\r\n  id: string;\r\n  name: string;\r\n  enName: string;\r\n  description: string;\r\n  /** 该主题主要取材的原子家族（A–L），便于人/AI 理解风格来源。 */\r\n  families: string[];\r\n  style: ThemeStyle;\r\n  timing: Timing;\r\n  /** 每个场景角色默认的入场/出场原子。 */\r\n  effects: Record<ThemeRole, EffectChoice>;\r\n};\r\n\r\nconst FONT_DEFAULT = 'Arial, \"PingFang SC\", \"Microsoft YaHei\", sans-serif';\r\nconst FONT_MONO = 'Menlo, Consolas, \"Courier New\", \"PingFang SC\", \"Microsoft YaHei\", monospace';\r\nconst FONT_SERIF = 'Georgia, \"Times New Roman\", \"Songti SC\", SimSun, serif';\r\n\r\nconst c = (inEffectId: number, outEffectId: number): EffectChoice => ({inEffectId, outEffectId});\r\n\r\n/** 五套预设主题。每套都从一两个原子家族里取材，保证整片视觉同源。 */\r\nexport const THEMES: Record<string, Theme> = {\r\n  glitch: {\r\n    id: 'glitch',\r\n    name: '故障赛博',\r\n    enName: 'Glitch / Cyber',\r\n    description: '数字故障风：乱码解码登场、RGB 撕裂离场；等宽字体、青色高亮、深色背景。',\r\n    families: ['H', 'K'],\r\n    style: {\r\n      background: 'radial-gradient(circle at 50% 42%, #0a1320 0%, #060a12 60%, #03050a 100%)',\r\n      color: '#eafcff',\r\n      accent: '#38e0ff',\r\n      barColor: 'rgba(6,14,20,0.78)',\r\n      fontFamily: FONT_MONO,\r\n      fontWeight: 800,\r\n      letterSpacing: 1,\r\n    },\r\n    timing: {inF: 20, holdF: 40, outF: 16},\r\n    effects: {\r\n      hero: c(72, 95),\r\n      list: c(74, 74),\r\n      lowerThird: c(72, 95),\r\n      caption: c(78, 79),\r\n      emphasis: c(95, 72),\r\n    },\r\n  },\r\n\r\n  soft: {\r\n    id: 'soft',\r\n    name: '柔和优雅',\r\n    enName: 'Soft / Focus',\r\n    description: '柔和聚焦风：从模糊对焦浮现、墨水晕染淡出；轻字重、蓝白配色，适合解说/科普。',\r\n    families: ['D', 'B'],\r\n    style: {\r\n      background: 'linear-gradient(180deg, #0c1426 0%, #0e1830 100%)',\r\n      color: '#f2f6ff',\r\n      accent: '#7aa2ff',\r\n      barColor: 'rgba(10,16,30,0.7)',\r\n      fontFamily: FONT_DEFAULT,\r\n      fontWeight: 600,\r\n      letterSpacing: 0,\r\n    },\r\n    timing: {inF: 22, holdF: 44, outF: 18},\r\n    effects: {\r\n      hero: c(31, 33),\r\n      list: c(11, 11),\r\n      lowerThird: c(31, 33),\r\n      caption: c(31, 31),\r\n      emphasis: c(34, 31),\r\n    },\r\n  },\r\n\r\n  bouncy: {\r\n    id: 'bouncy',\r\n    name: '活力弹跳',\r\n    enName: 'Bouncy / Spring',\r\n    description: '弹性活泼风：弹簧弹出、旋转缩放螺入/出；橙色高亮、重字重，适合宣传/活动片。',\r\n    families: ['C', 'B'],\r\n    style: {\r\n      background: 'radial-gradient(circle at 50% 40%, #1c2350 0%, #0d1130 60%, #070920 100%)',\r\n      color: '#ffffff',\r\n      accent: '#ff7a3c',\r\n      barColor: 'rgba(12,16,40,0.72)',\r\n      fontFamily: FONT_DEFAULT,\r\n      fontWeight: 900,\r\n      letterSpacing: 0,\r\n    },\r\n    timing: {inF: 20, holdF: 38, outF: 16},\r\n    effects: {\r\n      hero: c(21, 23),\r\n      list: c(13, 13),\r\n      lowerThird: c(12, 12),\r\n      caption: c(11, 11),\r\n      emphasis: c(21, 21),\r\n    },\r\n  },\r\n\r\n  minimal: {\r\n    id: 'minimal',\r\n    name: '极简打字',\r\n    enName: 'Minimal / Type',\r\n    description: '极简打字风：打字机逐字登场、字距收拢离场；近黑背景、细字重，适合代码/技术向。',\r\n    families: ['F'],\r\n    style: {\r\n      background: 'linear-gradient(180deg, #0a0c12 0%, #0c0f16 100%)',\r\n      color: '#f5f7fb',\r\n      accent: '#9aa7bd',\r\n      barColor: 'rgba(8,10,16,0.8)',\r\n      fontFamily: FONT_MONO,\r\n      fontWeight: 500,\r\n      letterSpacing: 1,\r\n    },\r\n    timing: {inF: 24, holdF: 42, outF: 14},\r\n    effects: {\r\n      hero: c(51, 58),\r\n      list: c(52, 52),\r\n      lowerThird: c(11, 11),\r\n      caption: c(51, 51),\r\n      emphasis: c(51, 58),\r\n    },\r\n  },\r\n\r\n  elegant: {\r\n    id: 'elegant',\r\n    name: '优雅衬线',\r\n    enName: 'Elegant / Serif',\r\n    description: '优雅衬线风：螺旋极坐标归位、辉光绽放强调；衬线字体、金色高亮，适合品牌/片头。',\r\n    families: ['E', 'G', 'D'],\r\n    style: {\r\n      background: 'radial-gradient(circle at 50% 40%, #20182a 0%, #120c18 60%, #0a060e 100%)',\r\n      color: '#f6efe2',\r\n      accent: '#d9b46a',\r\n      barColor: 'rgba(18,12,18,0.74)',\r\n      fontFamily: FONT_SERIF,\r\n      fontWeight: 600,\r\n      letterSpacing: 2,\r\n    },\r\n    timing: {inF: 24, holdF: 46, outF: 18},\r\n    effects: {\r\n      hero: c(47, 40),\r\n      list: c(11, 11),\r\n      lowerThird: c(69, 63),\r\n      caption: c(11, 11),\r\n      emphasis: c(34, 31),\r\n    },\r\n  },\r\n};\r\n\r\nexport const themeIds = Object.keys(THEMES);\r\n\r\nexport const getTheme = (id: string): Theme => {\r\n  const t = THEMES[id];\r\n  if (!t) throw new Error(`Unknown theme \"${id}\". Available: ${themeIds.join(', ')}`);\r\n  return t;\r\n};\r\n\r\n/** 各场景角色的默认主字号（可被 style 不影响；后续可扩展为主题级覆盖）。 */\r\nconst SCENE_SIZE: Record<ThemeRole, number> = {\r\n  hero: 180,\r\n  list: 70,\r\n  lowerThird: 88,\r\n  caption: 64,\r\n  emphasis: 88,\r\n};\r\n\r\n/* ----------------------------- 内容（文字） ----------------------------- */\r\n\r\nconst effectChoiceSchema = z.object({inEffectId: effectIdSchema, outEffectId: effectIdSchema});\r\n\r\n/** 主题内容：只填文字，动效/配色/字体由主题决定。某个角色缺省即不出现在成片里。 */\r\nexport const themeContentSchema = z.object({\r\n  hero: z\r\n    .object({entries: z.array(z.object({text: z.string(), sub: z.string().optional()}))})\r\n    .optional(),\r\n  list: z\r\n    .object({title: z.string().optional(), items: z.array(z.object({text: z.string()}))})\r\n    .optional(),\r\n  lowerThird: z\r\n    .object({entries: z.array(z.object({name: z.string(), role: z.string()}))})\r\n    .optional(),\r\n  caption: z.object({lines: z.array(z.object({text: z.string()}))}).optional(),\r\n  emphasis: z\r\n    .object({\r\n      lines: z.array(\r\n        z.object({pre: z.string(), token: z.string(), post: z.string(), accent: z.string().optional()})\r\n      ),\r\n    })\r\n    .optional(),\r\n});\r\nexport type ThemeContent = z.infer<typeof themeContentSchema>;\r\n\r\nconst themeStyleOverrideSchema = z\r\n  .object({\r\n    background: z.string(),\r\n    color: z.string(),\r\n    accent: z.string(),\r\n    barColor: z.string(),\r\n    fontFamily: z.string(),\r\n    fontWeight: z.number().int().positive(),\r\n    letterSpacing: z.number(),\r\n  })\r\n  .partial();\r\n\r\n/**\r\n * 主题配置 —— 这就是\"单一事实源\"：配置前端读写它、AI 拼它、`applyTheme` 解析它。\r\n * 解析结果是一份标准的 Reel props，可直接 `npx remotion render SceneReel --props`。\r\n */\r\nexport const themeConfigSchema = z.object({\r\n  theme: z.string(),\r\n  /** 成片里场景出现的顺序（缺省 hero→list→lowerThird→caption→emphasis）。 */\r\n  order: z.array(z.enum(themeRoles)).optional(),\r\n  /** 覆盖主题的共享配色/字体（微调用）。 */\r\n  style: themeStyleOverrideSchema.optional(),\r\n  /** 覆盖时序。 */\r\n  timing: timingSchema.optional(),\r\n  /** 逐场景覆盖入场/出场原子（在项目范围内细调）。 */\r\n  effects: z\r\n    .object({\r\n      hero: effectChoiceSchema.optional(),\r\n      list: effectChoiceSchema.optional(),\r\n      lowerThird: effectChoiceSchema.optional(),\r\n      caption: effectChoiceSchema.optional(),\r\n      emphasis: effectChoiceSchema.optional(),\r\n    })\r\n    .optional(),\r\n  content: themeContentSchema,\r\n});\r\nexport type ThemeConfig = z.infer<typeof themeConfigSchema>;\r\n\r\n/* ----------------------------- 解析为 Reel ----------------------------- */\r\n\r\nconst buildSegment = (\r\n  role: ThemeRole,\r\n  content: ThemeContent,\r\n  style: ThemeStyle,\r\n  timing: Timing,\r\n  eff: EffectChoice\r\n): ReelSegment | null => {\r\n  const ref = {effectId: eff.inEffectId, inEffectId: eff.inEffectId, outEffectId: eff.outEffectId};\r\n  const base = {\r\n    background: style.background,\r\n    fontFamily: style.fontFamily,\r\n    fontWeight: style.fontWeight,\r\n    letterSpacing: style.letterSpacing,\r\n  };\r\n  switch (role) {\r\n    case 'hero': {\r\n      if (!content.hero) return null;\r\n      return {\r\n        type: 'hero',\r\n        props: {\r\n          entries: content.hero.entries.map((e) => ({text: e.text, sub: e.sub, ...ref})),\r\n          timing,\r\n          color: style.color,\r\n          fontSize: SCENE_SIZE.hero,\r\n          ...base,\r\n        },\r\n      };\r\n    }\r\n    case 'list': {\r\n      if (!content.list) return null;\r\n      return {\r\n        type: 'list',\r\n        props: {\r\n          title: content.list.title ?? '',\r\n          items: content.list.items.map((it) => ({text: it.text, ...ref})),\r\n          stepFrames: 22,\r\n          inFrames: 18,\r\n          color: style.color,\r\n          fontSize: SCENE_SIZE.list,\r\n          ...base,\r\n        },\r\n      };\r\n    }\r\n    case 'lowerThird': {\r\n      if (!content.lowerThird) return null;\r\n      return {\r\n        type: 'lowerThird',\r\n        props: {\r\n          entries: content.lowerThird.entries.map((e) => ({name: e.name, role: e.role, ...ref})),\r\n          timing,\r\n          accent: style.accent,\r\n          ...base,\r\n        },\r\n      };\r\n    }\r\n    case 'caption': {\r\n      if (!content.caption) return null;\r\n      return {\r\n        type: 'caption',\r\n        props: {\r\n          lines: content.caption.lines.map((l) => ({text: l.text, ...ref})),\r\n          timing,\r\n          barColor: style.barColor,\r\n          color: style.color,\r\n          fontSize: SCENE_SIZE.caption,\r\n          ...base,\r\n        },\r\n      };\r\n    }\r\n    case 'emphasis': {\r\n      if (!content.emphasis) return null;\r\n      return {\r\n        type: 'emphasis',\r\n        props: {\r\n          lines: content.emphasis.lines.map((l) => ({\r\n            pre: l.pre,\r\n            token: l.token,\r\n            post: l.post,\r\n            accent: l.accent ?? style.accent,\r\n            ...ref,\r\n          })),\r\n          timing,\r\n          color: style.color,\r\n          fontSize: SCENE_SIZE.emphasis,\r\n          ...base,\r\n        },\r\n      };\r\n    }\r\n  }\r\n};\r\n\r\nconst DEFAULT_ORDER: ThemeRole[] = ['hero', 'list', 'lowerThird', 'caption', 'emphasis'];\r\n\r\n/** 把一份主题配置解析成标准 Reel props（多场景串联成片）。 */\r\nexport const resolveThemeConfig = (config: ThemeConfig): ReelProps => {\r\n  const theme = getTheme(config.theme);\r\n  const style: ThemeStyle = {...theme.style, ...config.style};\r\n  const timing = config.timing ?? theme.timing;\r\n  const order = config.order ?? DEFAULT_ORDER;\r\n  const segments: ReelSegment[] = [];\r\n  for (const role of order) {\r\n    const eff = config.effects?.[role] ?? theme.effects[role];\r\n    const seg = buildSegment(role, config.content, style, timing, eff);\r\n    if (seg) segments.push(seg);\r\n  }\r\n  return {segments};\r\n};\r\n\r\n/** 便捷封装：给定主题名 + 内容，直接得到 Reel props。 */\r\nexport const applyTheme = (\r\n  themeId: string,\r\n  content: ThemeContent,\r\n  overrides?: Omit<ThemeConfig, 'theme' | 'content'>\r\n): ReelProps => resolveThemeConfig({theme: themeId, content, ...overrides});\r\n\r\n/** 主题配置的总时长（帧），供 Remotion calculateMetadata 使用。 */\r\nexport const themeConfigFrames = (config: ThemeConfig): number =>\r\n  reelFrames(resolveThemeConfig(config));\r\n\r\n/** 演示内容：未提供内容时用它生成一段可直接预览的成片。 */\r\nexport const DEMO_CONTENT: ThemeContent = {\r\n  hero: {entries: [{text: '主题成套动效', sub: 'One theme · consistent motion'}]},\r\n  list: {\r\n    title: '一个主题搞定整片',\r\n    items: [\r\n      {text: '标题、列表、字幕…自动协调'},\r\n      {text: '入场/出场可分别切换'},\r\n      {text: '配色/字体/节奏全主题统一'},\r\n      {text: '导出即一份配置 JSON'},\r\n    ],\r\n  },\r\n  lowerThird: {entries: [{name: '林述白', role: '动态设计师 / Motion Designer'}]},\r\n  caption: {lines: [{text: '选一个主题，整片风格一键成套。'}, {text: '再逐场景微调入场与出场。'}]},\r\n  emphasis: {lines: [{pre: '只需 ', token: '一个主题', post: ' 即可统一全片。'}]},\r\n};\r\n\r\n/** SceneTheme 合成的默认配置（Studio 初始值 / AI 调用范例）。 */\r\nexport const THEME_CONFIG_DEFAULT: ThemeConfig = {theme: 'glitch', content: DEMO_CONTENT};\r\n\r\n/** 主题清单（供机读 / 配置前端列出可选项）。 */\r\nexport const THEME_MANIFEST = themeIds.map((id) => {\r\n  const t = THEMES[id];\r\n  return {\r\n    id: t.id,\r\n    name: t.name,\r\n    enName: t.enName,\r\n    description: t.description,\r\n    families: t.families,\r\n    effects: t.effects,\r\n  };\r\n});\r\n","src/textfx/scenes/sequence.ts":"import {Phase} from '../types';\r\n\r\n/**\r\n * 顺序场景的时间编排：每条内容占一个 slot = 入场 + 停留 + 出场。\r\n * 用于\"一次只有一条在台上\"的场景（Hero / Caption / Lower-third）。\r\n */\r\nexport type SeqTiming = {inF: number; holdF: number; outF: number};\r\n\r\nexport const slotLen = (s: SeqTiming): number => s.inF + s.holdF + s.outF;\r\n\r\nexport const seqAt = (\r\n  frame: number,\r\n  s: SeqTiming\r\n): {active: number; phase: Phase; t: number; local: number} => {\r\n  const slot = slotLen(s);\r\n  const active = Math.floor(frame / slot);\r\n  const local = frame - active * slot;\r\n  if (local < s.inF) return {active, phase: 'in', t: local / s.inF, local};\r\n  if (local < s.inF + s.holdF) return {active, phase: 'in', t: 1, local};\r\n  return {active, phase: 'out', t: (local - s.inF - s.holdF) / s.outF, local};\r\n};\r\n\r\nexport const seqTotalFrames = (count: number, s: SeqTiming): number => count * slotLen(s);\r\n","src/textfx/scenes/ThemeScene.tsx":"import React from 'react';\r\nimport {ReelScene} from './ReelScene';\r\nimport {ThemeConfig, resolveThemeConfig} from '../themes';\r\n\r\n/**\r\n * 场景 · Theme 主题成片\r\n *  输入一份\"主题配置\"（主题名 + 文字内容 + 可选逐场景覆盖），解析成多场景串联成片。\r\n *  这就是\"选一个主题即出整套协调动效\"的合成；其 props（ThemeConfig）即单一事实源。\r\n */\r\nexport const ThemeScene: React.FC<ThemeConfig> = (config) => {\r\n  const {segments} = resolveThemeConfig(config);\r\n  return <ReelScene segments={segments} />;\r\n};\r\n","src/textfx/scenes/ReelScene.tsx":"import React from 'react';\r\nimport {AbsoluteFill, Series} from 'remotion';\r\nimport {HeroScene} from './HeroScene';\r\nimport {CaptionScene} from './CaptionScene';\r\nimport {ListScene} from './ListScene';\r\nimport {LowerThirdScene} from './LowerThirdScene';\r\nimport {EmphasisScene} from './EmphasisScene';\r\nimport {GalleryScene} from './GalleryScene';\r\nimport {ReelSegment, segmentFrames} from '../schemas';\r\n\r\n/**\r\n * 场景 · Reel 串联成片\r\n *  把多个场景片段按顺序拼成一条完整成片（片头 → 字幕 → 角标 → 行内强调 → 结尾 …）。\r\n *  每个片段 = {type, props}，时长由各场景的 *Frames() 自动推算，用 <Series> 顺序播放。\r\n */\r\n\r\nconst renderSegment = (s: ReelSegment): React.ReactNode => {\r\n  switch (s.type) {\r\n    case 'hero':\r\n      return <HeroScene {...s.props} />;\r\n    case 'caption':\r\n      return <CaptionScene {...s.props} />;\r\n    case 'list':\r\n      return <ListScene {...s.props} />;\r\n    case 'lowerThird':\r\n      return <LowerThirdScene {...s.props} />;\r\n    case 'emphasis':\r\n      return <EmphasisScene {...s.props} />;\r\n    case 'gallery':\r\n      return <GalleryScene {...s.props} />;\r\n  }\r\n};\r\n\r\nexport const ReelScene: React.FC<{segments: ReelSegment[]}> = ({segments}) => {\r\n  return (\r\n    <AbsoluteFill style={{background: '#05060d'}}>\r\n      <Series>\r\n        {segments.map((s, i) => (\r\n          <Series.Sequence key={i} durationInFrames={segmentFrames(s)}>\r\n            {renderSegment(s)}\r\n          </Series.Sequence>\r\n        ))}\r\n      </Series>\r\n    </AbsoluteFill>\r\n  );\r\n};\r\n","src/textfx/scenes/HeroScene.tsx":"import React from 'react';\r\nimport {AbsoluteFill, useCurrentFrame} from 'remotion';\r\nimport {TextFx} from '../TextFx';\r\nimport {effectById} from '../library';\r\nimport {SeqTiming, seqAt} from './sequence';\r\nimport {clamp01, DEFAULT_FONT_FAMILY, alignToFlex, vAlignToFlex, pickPhaseEffectId} from '../shared';\r\n\r\n/**\r\n * 场景 · Hero 主标题\r\n *  单段超大文字居中，戏剧化入场 → 停留 → 戏剧化出场，**不堆叠**。\r\n *  适合：片头、章节大字报、kinetic typography 高光时刻。\r\n *\r\n *  排版/位置全部可由 props 定义（字号/字重/字体/对齐/垂直对齐/位置偏移/副标题样式）。\r\n */\r\nexport type HeroEntry = {text: string; sub?: string; effectId: number; inEffectId?: number; outEffectId?: number};\r\n\r\nexport const HeroScene: React.FC<{\r\n  entries: HeroEntry[];\r\n  timing?: SeqTiming;\r\n  background?: string;\r\n  color?: string;\r\n  fontSize?: number;\r\n  fontWeight?: number;\r\n  fontFamily?: string;\r\n  letterSpacing?: number;\r\n  align?: 'left' | 'center' | 'right';\r\n  vAlign?: 'top' | 'center' | 'bottom';\r\n  offsetX?: number;\r\n  offsetY?: number;\r\n  subSize?: number;\r\n  subColor?: string;\r\n  showLabel?: boolean;\r\n}> = ({\r\n  entries,\r\n  timing = {inF: 22, holdF: 40, outF: 18},\r\n  background = 'radial-gradient(circle at 50% 42%, #1b1f3a 0%, #0c0e1c 60%, #05060d 100%)',\r\n  color = '#ffffff',\r\n  fontSize = 200,\r\n  fontWeight = 900,\r\n  fontFamily = DEFAULT_FONT_FAMILY,\r\n  letterSpacing = 0,\r\n  align = 'center',\r\n  vAlign = 'center',\r\n  offsetX = 0,\r\n  offsetY = 0,\r\n  subSize = 34,\r\n  subColor = '#9fb2e6',\r\n  showLabel = true,\r\n}) => {\r\n  const frame = useCurrentFrame();\r\n  const {active, phase, t} = seqAt(frame, timing);\r\n  const entry = entries[Math.min(active, entries.length - 1)];\r\n  if (!entry) return <AbsoluteFill style={{background}} />;\r\n  const fx = effectById(pickPhaseEffectId(entry, phase));\r\n  const subOpacity = phase === 'in' ? clamp01((t - 0.4) / 0.5) : 1 - clamp01(t * 2);\r\n\r\n  return (\r\n    <AbsoluteFill style={{background, color, fontFamily}}>\r\n      <AbsoluteFill\r\n        style={{\r\n          alignItems: alignToFlex(align),\r\n          justifyContent: vAlignToFlex(vAlign),\r\n          flexDirection: 'column',\r\n          padding: '64px 80px',\r\n          transform: `translate(${offsetX}px, ${offsetY}px)`,\r\n        }}\r\n      >\r\n        <TextFx\r\n          key={active}\r\n          effect={fx}\r\n          text={entry.text}\r\n          phase={phase}\r\n          t={t}\r\n          frame={frame}\r\n          seed={active + 1}\r\n          baseStyle={{fontSize, fontWeight, letterSpacing, lineHeight: 1, textAlign: align}}\r\n        />\r\n        {entry.sub ? (\r\n          <div style={{marginTop: 36, fontSize: subSize, letterSpacing: 6, color: subColor, opacity: subOpacity}}>\r\n            {entry.sub}\r\n          </div>\r\n        ) : null}\r\n      </AbsoluteFill>\r\n      {showLabel ? (\r\n        <div style={{position: 'absolute', left: 60, top: 48, fontSize: 24, letterSpacing: 4, color: '#5b6688'}}>\r\n          HERO · {fx.category}{String(fx.id).padStart(2, '0')} · {fx.enName}\r\n        </div>\r\n      ) : null}\r\n    </AbsoluteFill>\r\n  );\r\n};\r\n","src/textfx/scenes/CaptionScene.tsx":"import React from 'react';\r\nimport {AbsoluteFill, useCurrentFrame} from 'remotion';\r\nimport {TextFx} from '../TextFx';\r\nimport {effectById} from '../library';\r\nimport {SeqTiming, seqAt} from './sequence';\r\nimport {DEFAULT_FONT_FAMILY, alignToFlex, pickPhaseEffectId} from '../shared';\r\n\r\n/**\r\n * 场景 · Caption 字幕\r\n *  下三分之一、可读性优先：快速进出、原地替换，停留时长占多数。\r\n *  适合：对白字幕、解说词、轻量说明。同一时刻只有一条，不堆叠。\r\n */\r\nexport type CaptionLine = {text: string; effectId: number; inEffectId?: number; outEffectId?: number};\r\n\r\nexport const CaptionScene: React.FC<{\r\n  lines: CaptionLine[];\r\n  timing?: SeqTiming;\r\n  background?: string;\r\n  barColor?: string;\r\n  color?: string;\r\n  fontSize?: number;\r\n  fontWeight?: number;\r\n  fontFamily?: string;\r\n  letterSpacing?: number;\r\n  align?: 'left' | 'center' | 'right';\r\n  offsetX?: number;\r\n  offsetY?: number;\r\n  showLabel?: boolean;\r\n}> = ({\r\n  lines,\r\n  timing = {inF: 10, holdF: 44, outF: 8},\r\n  background = 'linear-gradient(180deg, #0a1020 0%, #0d1426 100%)',\r\n  barColor = 'rgba(10,14,26,0.72)',\r\n  color = '#f2f6ff',\r\n  fontSize = 64,\r\n  fontWeight = 700,\r\n  fontFamily = DEFAULT_FONT_FAMILY,\r\n  letterSpacing = 0,\r\n  align = 'center',\r\n  offsetX = 0,\r\n  offsetY = 0,\r\n  showLabel = true,\r\n}) => {\r\n  const frame = useCurrentFrame();\r\n  const {active, phase, t} = seqAt(frame, timing);\r\n  const line = lines[Math.min(active, lines.length - 1)];\r\n  const fx = line ? effectById(pickPhaseEffectId(line, phase)) : null;\r\n\r\n  return (\r\n    <AbsoluteFill style={{background, fontFamily}}>\r\n      {showLabel ? (\r\n        <div style={{position: 'absolute', left: 60, top: 48, fontSize: 24, letterSpacing: 4, color: '#5b6688'}}>\r\n          CAPTION · 下三分之一字幕\r\n        </div>\r\n      ) : null}\r\n      <div\r\n        style={{\r\n          position: 'absolute',\r\n          left: 0,\r\n          right: 0,\r\n          bottom: 110 + offsetY * -1,\r\n          display: 'flex',\r\n          justifyContent: alignToFlex(align),\r\n          padding: '0 80px',\r\n          transform: `translateX(${offsetX}px)`,\r\n        }}\r\n      >\r\n        <div\r\n          style={{\r\n            background: barColor,\r\n            padding: '20px 48px',\r\n            borderRadius: 14,\r\n            maxWidth: 1500,\r\n            textAlign: align,\r\n            boxShadow: '0 18px 60px rgba(0,0,0,0.4)',\r\n          }}\r\n        >\r\n          {fx && line ? (\r\n            <TextFx\r\n              key={active}\r\n              effect={fx}\r\n              text={line.text}\r\n              phase={phase}\r\n              t={t}\r\n              frame={frame}\r\n              seed={active + 1}\r\n              baseStyle={{fontSize, fontWeight, letterSpacing, color, lineHeight: 1.2, whiteSpace: 'normal'}}\r\n            />\r\n          ) : null}\r\n        </div>\r\n      </div>\r\n    </AbsoluteFill>\r\n  );\r\n};\r\n","src/textfx/scenes/ListScene.tsx":"import React from 'react';\r\nimport {AbsoluteFill, useCurrentFrame} from 'remotion';\r\nimport {TextFx} from '../TextFx';\r\nimport {effectById} from '../library';\r\nimport {clamp01, DEFAULT_FONT_FAMILY, pickPhaseEffectId} from '../shared';\r\n\r\n/**\r\n * 场景 · List 逐条列表（Build）\r\n *  条目依次入场并**持续累积**（不出场），强调\"逐条建立\"。\r\n *  适合：要点列表、排行榜、清单、功能罗列。\r\n */\r\nexport type ListItem = {text: string; effectId: number; inEffectId?: number; outEffectId?: number};\r\n\r\nexport const ListScene: React.FC<{\r\n  title?: string;\r\n  items: ListItem[];\r\n  stepFrames?: number;\r\n  inFrames?: number;\r\n  background?: string;\r\n  color?: string;\r\n  fontSize?: number;\r\n  fontWeight?: number;\r\n  fontFamily?: string;\r\n  letterSpacing?: number;\r\n  showLabel?: boolean;\r\n}> = ({\r\n  title = '逐条列表',\r\n  items,\r\n  stepFrames = 22,\r\n  inFrames = 18,\r\n  background = 'linear-gradient(135deg, #101a33 0%, #0a1020 100%)',\r\n  color = '#eaf0ff',\r\n  fontSize = 70,\r\n  fontWeight = 700,\r\n  fontFamily = DEFAULT_FONT_FAMILY,\r\n  letterSpacing = 0,\r\n  showLabel = true,\r\n}) => {\r\n  const frame = useCurrentFrame();\r\n  return (\r\n    <AbsoluteFill style={{background, color, fontFamily}}>\r\n      {showLabel ? (\r\n        <div style={{position: 'absolute', left: 140, top: 110, fontSize: 40, fontWeight: 800, letterSpacing: 4, color: '#6fa0ff'}}>\r\n          {title}\r\n        </div>\r\n      ) : null}\r\n      <div style={{position: 'absolute', left: 140, top: 230, right: 140, display: 'flex', flexDirection: 'column', gap: 28}}>\r\n        {items.map((it, i) => {\r\n          const start = i * stepFrames;\r\n          if (frame < start) return null;\r\n          const t = clamp01((frame - start) / inFrames);\r\n          const fx = effectById(pickPhaseEffectId(it, 'in'));\r\n          return (\r\n            <div key={i} style={{display: 'flex', alignItems: 'center', gap: 28}}>\r\n              <span\r\n                style={{\r\n                  width: 16,\r\n                  height: 16,\r\n                  borderRadius: 8,\r\n                  background: '#4aa3ff',\r\n                  opacity: t,\r\n                  flex: '0 0 auto',\r\n                  boxShadow: '0 0 18px rgba(74,163,255,0.7)',\r\n                }}\r\n              />\r\n              <TextFx\r\n                effect={fx}\r\n                text={it.text}\r\n                phase=\"in\"\r\n                t={t}\r\n                frame={frame}\r\n                seed={i + 1}\r\n                baseStyle={{fontSize, fontWeight, letterSpacing, whiteSpace: 'normal'}}\r\n              />\r\n            </div>\r\n          );\r\n        })}\r\n      </div>\r\n    </AbsoluteFill>\r\n  );\r\n};\r\n\r\nexport const listTotalFrames = (count: number, stepFrames = 22, inFrames = 18, tail = 30): number =>\r\n  (count - 1) * stepFrames + inFrames + tail;\r\n","src/textfx/scenes/LowerThirdScene.tsx":"import React from 'react';\r\nimport {AbsoluteFill, useCurrentFrame} from 'remotion';\r\nimport {TextFx} from '../TextFx';\r\nimport {effectById} from '../library';\r\nimport {SeqTiming, seqAt} from './sequence';\r\nimport {clamp01, easeOutCubic, lerp, DEFAULT_FONT_FAMILY, pickPhaseEffectId} from '../shared';\r\n\r\n/**\r\n * 场景 · Lower-third 角标 / 署名\r\n *  带品牌底条，从左侧滑入 → 停留 → 滑出；主名用动效原子入场，副行说明淡入。\r\n *  适合：人物署名、地点角标、栏目标识。\r\n */\r\nexport type LowerThirdEntry = {name: string; role: string; effectId: number; inEffectId?: number; outEffectId?: number};\r\n\r\nexport const LowerThirdScene: React.FC<{\r\n  entries: LowerThirdEntry[];\r\n  timing?: SeqTiming;\r\n  background?: string;\r\n  accent?: string;\r\n  fontSize?: number;\r\n  fontWeight?: number;\r\n  fontFamily?: string;\r\n  letterSpacing?: number;\r\n  offsetX?: number;\r\n  offsetY?: number;\r\n  showLabel?: boolean;\r\n}> = ({\r\n  entries,\r\n  timing = {inF: 16, holdF: 40, outF: 14},\r\n  background = 'linear-gradient(120deg, #0b1530 0%, #0a0f1f 100%)',\r\n  accent = '#ff7a3c',\r\n  fontSize = 88,\r\n  fontWeight = 900,\r\n  fontFamily = DEFAULT_FONT_FAMILY,\r\n  letterSpacing = 0,\r\n  offsetX = 0,\r\n  offsetY = 0,\r\n  showLabel = true,\r\n}) => {\r\n  const frame = useCurrentFrame();\r\n  const {active, phase, t} = seqAt(frame, timing);\r\n  const entry = entries[Math.min(active, entries.length - 1)];\r\n  if (!entry) return <AbsoluteFill style={{background}} />;\r\n  const fx = effectById(pickPhaseEffectId(entry, phase));\r\n\r\n  const slide = phase === 'in' ? easeOutCubic(clamp01(t)) : 1 - easeOutCubic(clamp01(t));\r\n  const boxX = lerp(-120, 0, slide);\r\n  const roleOpacity = phase === 'in' ? clamp01((t - 0.4) / 0.5) : slide;\r\n\r\n  return (\r\n    <AbsoluteFill style={{background, fontFamily}}>\r\n      {showLabel ? (\r\n        <div style={{position: 'absolute', left: 60, top: 48, fontSize: 24, letterSpacing: 4, color: '#5b6688'}}>\r\n          LOWER-THIRD · 角标 / 署名\r\n        </div>\r\n      ) : null}\r\n      <div\r\n        style={{\r\n          position: 'absolute',\r\n          left: 150 + offsetX,\r\n          bottom: 170 - offsetY,\r\n          transform: `translateX(${boxX}px)`,\r\n          opacity: clamp01(slide * 1.3),\r\n          display: 'flex',\r\n          alignItems: 'stretch',\r\n        }}\r\n      >\r\n        <div style={{width: 10, background: accent, borderRadius: 4, marginRight: 26, boxShadow: `0 0 22px ${accent}`}} />\r\n        <div>\r\n          <div style={{fontSize, fontWeight, color: '#ffffff', lineHeight: 1.05}}>\r\n            <TextFx\r\n              key={active}\r\n              effect={fx}\r\n              text={entry.name}\r\n              phase={phase}\r\n              t={t}\r\n              frame={frame}\r\n              seed={active + 1}\r\n              baseStyle={{fontSize, fontWeight, letterSpacing, color: '#ffffff'}}\r\n            />\r\n          </div>\r\n          <div style={{fontSize: Math.round(fontSize * 0.41), color: accent, marginTop: 10, letterSpacing: 2, opacity: roleOpacity}}>\r\n            {entry.role}\r\n          </div>\r\n        </div>\r\n      </div>\r\n    </AbsoluteFill>\r\n  );\r\n};\r\n","src/textfx/scenes/EmphasisScene.tsx":"import React from 'react';\r\nimport {AbsoluteFill, useCurrentFrame} from 'remotion';\r\nimport {TextFx} from '../TextFx';\r\nimport {effectById} from '../library';\r\nimport {SeqTiming, seqAt} from './sequence';\r\nimport {clamp01, DEFAULT_FONT_FAMILY, pickPhaseEffectId} from '../shared';\r\n\r\n/**\r\n * 场景 · Emphasis 行内强调\r\n *  一句话里某个词/数字被\"点出来\"：周边文字先淡入，强调词用动效原子登场并高亮。\r\n *  适合：关键词高亮、数字强调、解说重点。\r\n */\r\nexport type EmphasisLine = {pre: string; token: string; post: string; effectId: number; inEffectId?: number; outEffectId?: number; accent?: string};\r\n\r\nexport const EmphasisScene: React.FC<{\r\n  lines: EmphasisLine[];\r\n  timing?: SeqTiming;\r\n  background?: string;\r\n  color?: string;\r\n  fontSize?: number;\r\n  fontWeight?: number;\r\n  fontFamily?: string;\r\n  letterSpacing?: number;\r\n  align?: 'left' | 'center' | 'right';\r\n  showLabel?: boolean;\r\n}> = ({\r\n  lines,\r\n  timing = {inF: 16, holdF: 42, outF: 12},\r\n  background = 'radial-gradient(circle at 50% 50%, #161a2e 0%, #0a0c16 70%)',\r\n  color = '#e7ecff',\r\n  fontSize = 88,\r\n  fontWeight = 800,\r\n  fontFamily = DEFAULT_FONT_FAMILY,\r\n  letterSpacing = 0,\r\n  align = 'center',\r\n  showLabel = true,\r\n}) => {\r\n  const frame = useCurrentFrame();\r\n  const {active, phase, t} = seqAt(frame, timing);\r\n  const line = lines[Math.min(active, lines.length - 1)];\r\n  if (!line) return <AbsoluteFill style={{background}} />;\r\n  const fx = effectById(pickPhaseEffectId(line, phase));\r\n  const accent = line.accent ?? '#ffd23f';\r\n  const baseOpacity = phase === 'in' ? clamp01(t * 2) : 1 - clamp01(t * 2);\r\n\r\n  return (\r\n    <AbsoluteFill style={{background, color, fontFamily}}>\r\n      {showLabel ? (\r\n        <div style={{position: 'absolute', left: 60, top: 48, fontSize: 24, letterSpacing: 4, color: '#5b6688'}}>\r\n          EMPHASIS · 行内强调\r\n        </div>\r\n      ) : null}\r\n      <AbsoluteFill style={{alignItems: 'center', justifyContent: 'center', padding: '0 160px'}}>\r\n        <div style={{fontSize, fontWeight, letterSpacing, lineHeight: 1.4, textAlign: align}}>\r\n          <span style={{opacity: baseOpacity}}>{line.pre}</span>\r\n          <span style={{color: accent, margin: '0 6px', display: 'inline-block'}}>\r\n            <TextFx\r\n              key={active}\r\n              effect={fx}\r\n              text={line.token}\r\n              phase={phase}\r\n              t={t}\r\n              frame={frame}\r\n              seed={active + 1}\r\n              baseStyle={{fontSize, fontWeight: Math.max(fontWeight, 900), letterSpacing, color: accent, whiteSpace: 'nowrap'}}\r\n            />\r\n          </span>\r\n          <span style={{opacity: baseOpacity}}>{line.post}</span>\r\n        </div>\r\n      </AbsoluteFill>\r\n    </AbsoluteFill>\r\n  );\r\n};\r\n"}</script>

const sceneStyles={};

function getLoVal(role,prop){return sceneStyles[role]?.[prop];}
function setLoVal(role,prop,val){
  if(!sceneStyles[role])sceneStyles[role]={};
  if(val===undefined||val===''||val===null)delete sceneStyles[role][prop];

  if(!Object.keys(sceneStyles[role]).length)delete sceneStyles[role];

function renderLoControls(){
  const c=document.getElementById('loControls');c.innerHTML='';

  }
  if(caps.offsetX||caps.offsetY){
    html+=`<span class="lo-lbl">偏移</span><div class="lo-pair">`;
    if(caps.offsetX){const v=getLoVal(r,'offsetX');html+=`<div class="lo-sub"><label>X</label><input class="lo-input" type="number" step="1" placeholder="0" value="${v!=null?v:''}" onchange="setLoVal('${r}','offsetX',this.value?+this.value:undefined)"></div>`;}
    if(caps.offsetY){const v=getLoVal(r,'offsetY');html+=`<div class="lo-sub"><label>Y</label><input class="lo-input" type="number" step="1" placeholder="0" value="${v!=null?v:''}" onchange="setLoVal('${r}','offsetY',this.value?+this.value:undefined)"></div>`;}
    html+=`</div>`;
  }
  if(caps.align){
    const v=getLoVal(r,'align')||'';
    html+=`<span class="lo-lbl">水平</span><select class="lo-sel" onchange="setLoVal('${r}','align',this.value||undefined)">`;
    for(const o of ALIGN_OPTS)html+=`<option value="${o.v}"${v===o.v?' selected':''}>${o.l}</option>`;
    html+=`</select>`;
  }
  if(caps.vAlign){
    const v=getLoVal(r,'vAlign')||'';
    html+=`<span class="lo-lbl">垂直</span><select class="lo-sel" onchange="setLoVal('${r}','vAlign',this.value||undefined)">`;
    for(const o of VALIGN_OPTS)html+=`<option value="${o.v}"${v===o.v?' selected':''}>${o.l}</option>`;
    html+=`</select>`;
  }

  c.innerHTML=html;

// === Build config ===
function buildCfg(){
  const cfg={theme:S.theme};
  if(sceneOrder.some((r,i)=>r!==ORD[i]))cfg.order=sceneOrder.slice();
  cfg.content={};
  if(S.content.hero?.entries?.length) cfg.content.hero=S.content.hero;
  if(S.content.list?.items?.length){cfg.content.list={items:S.content.list.items};if(S.content.list.title)cfg.content.list.title=S.content.list.title;}
  if(S.content.lowerThird?.entries?.length) cfg.content.lowerThird=S.content.lowerThird;
  if(S.content.caption?.lines?.length) cfg.content.caption=S.content.caption;
  if(S.content.emphasis?.lines?.length) cfg.content.emphasis=S.content.emphasis;
  if(timOv){cfg.timing={inF:+document.getElementById('inF').value,holdF:+document.getElementById('holdF').value,outF:+document.getElementById('outF').value};}
  const st={};
  const bg=document.getElementById('bgT').value.trim(),fg=document.getElementById('fgT').value.trim(),ac=document.getElementById('acT').value.trim();
  if(bg)st.background=bg;if(fg)st.color=fg;if(ac)st.accent=ac;
  if(Object.keys(st).length)cfg.style=st;
  const eff={};
  for(const r of ORD){const i=+document.getElementById(`eo-${r}-in`).value,o=+document.getElementById(`eo-${r}-out`).value;const th=TH[S.theme].effects[r];if(i!==th.i||o!==th.o)eff[r]={inEffectId:i,outEffectId:o};}
  if(Object.keys(eff).length)cfg.effects=eff;
  const ss={};
  for(const r of ORD){if(sceneStyles[r]&&Object.keys(sceneStyles[r]).length)ss[r]={...sceneStyles[r]};}
  if(Object.keys(ss).length)cfg.sceneStyle=ss;
  return cfg;
}

// === Update ===
function uc(){
  const cfg=buildCfg();const json=JSON.stringify(cfg,null,2);
  document.getElementById('oJson').textContent=json;
  document.getElementById('oReadme').textContent=genRm(cfg);
  document.getElementById('oCmd').textContent=`npx remotion render src/index.ts SceneTheme out.mp4 --props='${json.trim()}'`;
  const total=ORD.reduce((a,r)=>a+getCnt(r),0);
  document.getElementById('botInfo').textContent=`${total} 项 · ${TH[S.theme].name}`;
  restartPv();
}
function genRm(cfg){
  const th=TH[cfg.theme];if(!th)return'';
  const json=JSON.stringify(cfg,null,2);

function simFx(id,ph,t){
  const cat=Math.ceil(id/10);const ez=t=>1-Math.pow(1-t,3);const p=ph==='in'?ez(Math.min(1,Math.max(0,t))):1-ez(Math.min(1,Math.max(0,t)));const s={};
  switch(cat){
    case 1:s.opacity=p;break;
    case 2:s.opacity=Math.min(1,p*2);s.transform=`translateY(${(1-p)*35}px)`;break;
    case 3:s.opacity=Math.min(1,p*1.5);s.transform=`scale(${.3+p*.7}) rotate(${(ph==='in'?-1:1)*(1-p)*15}deg)`;break;
    case 4:s.opacity=p;s.filter=`blur(${(1-p)*8}px)`;break;
    case 5:s.opacity=p;s.transform=`translateY(${Math.sin(t*Math.PI*3)*(1-p)*10}px) rotate(${(1-p)*8}deg)`;break;
    case 6:s.opacity=1;s.clipPath=`inset(0 ${(1-p)*100}% 0 0)`;s.transform=`translateX(${(1-p)*-8}px)`;break;
    case 7:s.opacity=1;s.clipPath=id%2?`inset(${(1-p)*50}% 0 ${(1-p)*50}% 0)`:`inset(0 ${(1-p)*50}% 0 ${(1-p)*50}%)`;break;
    case 8:s.opacity=Math.min(1,p*1.5);s.transform=`translate(${(1-p)*Math.sin(t*37)*6}px,${(1-p)*Math.cos(t*53)*3}px)`;s.filter=`brightness(${1+(1-p)*.5})`;break;
    case 9:s.opacity=p;s.transform=`scale(${.2+p*.8}) rotate(${(1-p)*180}deg)`;s.filter=`blur(${(1-p)*3}px)`;break;
    case 10:s.opacity=p;s.filter=`brightness(${1+(1-p)*1.5}) saturate(${.5+p*.5})`;s.transform=`scale(${.95+p*.05})`;break;
    case 11:s.opacity=Math.min(1,p*2);s.transform=`translateX(${(1-p)*Math.sin(t*100)*5}px) skewX(${(1-p)*8}deg)`;s.filter=`hue-rotate(${(1-p)*90}deg) brightness(${1+(1-p)*.8})`;break;
    case 12:s.opacity=p;s.transform=`translate(${(1-p)*Math.sin(t*23)*12}px,${(1-p)*Math.cos(t*31)*6}px) rotate(${(1-p)*Math.sin(t*17)*18}deg) scale(${.5+p*.5})`;break;
    default:s.opacity=p;
  }
  return s;
}

}

// === ZIP ===
const cT=new Uint32Array(256);for(let i=0;i<256;i++){let c=i;for(let k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;cT[i]=c;}
function crc32(d){let c=0xFFFFFFFF;for(let i=0;i<d.length;i++)c=(c>>>8)^cT[(c^d[i])&0xFF];return(c^0xFFFFFFFF)>>>0;}
function w16(v,a,o){a[o]=v&0xFF;a[o+1]=(v>>>8)&0xFF;}
function w32(v,a,o){a[o]=v&0xFF;a[o+1]=(v>>>8)&0xFF;a[o+2]=(v>>>16)&0xFF;a[o+3]=(v>>>24)&0xFF;}
function createZip(files){
  const enc=new TextEncoder();const entries=[];const chunks=[];let offset=0;
  for(const[name,content]of Object.entries(files)){
    const data=enc.encode(content);const crc=crc32(data);const nb=enc.encode(name);
    const hdr=new Uint8Array(30+nb.length);
    hdr[0]=0x50;hdr[1]=0x4B;hdr[2]=0x03;hdr[3]=0x04;hdr[4]=20;
    w32(crc,hdr,14);w32(data.length,hdr,18);w32(data.length,hdr,22);w16(nb.length,hdr,26);
    hdr.set(nb,30);
    chunks.push(hdr,data);
    entries.push({name,nb,data,crc,offset});
    offset+=hdr.length+data.length;
  }
  const cdChunks=[];let cdSize=0;
  for(const e of entries){
    const nb=enc.encode(e.name);
    const cd=new Uint8Array(46+nb.length);
    cd[0]=0x50;cd[1]=0x4B;cd[2]=0x01;cd[3]=0x02;cd[4]=20;cd[6]=20;
    w32(e.crc,cd,16);w32(e.data.length,cd,20);w32(e.data.length,cd,24);
    w16(nb.length,cd,28);
    w32(e.offset,cd,42);
    cd.set(nb,46);
    cdChunks.push(cd);cdSize+=cd.length;
  }
  const eocd=new Uint8Array(22);
  eocd[0]=0x50;eocd[1]=0x4B;eocd[2]=0x05;eocd[3]=0x06;
  w16(entries.length,eocd,8);w16(entries.length,eocd,10);
  w32(cdSize,eocd,12);w32(offset,eocd,16);
  const total=offset+cdSize+22;const result=new Uint8Array(total);let pos=0;
  for(const c of chunks){result.set(c,pos);pos+=c.length;}
  for(const c of cdChunks){result.set(c,pos);pos+=c.length;}
  result.set(eocd,pos);
  return result;
}
function downloadZip(files,name){const z=createZip(files);const b=new Blob([z.buffer],{type:'application/zip'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);}
